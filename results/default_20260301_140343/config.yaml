data:
  dataset_path: data/CORAL/coral-expert-curated-medical-oncology-reports-to-advance-language-model-inference-1.0/coral/unannotated/data/breastca_unannotated.csv
  row_range:
  - 20
  - 40
experiment:
  name: default
  seed: 42
extraction:
  max_retries: 3
  pipeline: v2
  verify: true
generation:
  assessment_plan:
    do_sample: false
    max_new_tokens: 2048
  keypoint:
    do_sample: false
    max_new_tokens: 768
  retry:
    do_sample: true
    max_new_tokens: 2048
    temperature: 0.6
    top_p: 0.9
model:
  cache_dir: /mnt/c/Users/yc/.cache/huggingface
  chat_template: llama3
  device_map: auto
  dtype: bfloat16
  name: meta-llama/Llama-3.1-8B-Instruct
prompts:
  extraction: prompts/extraction.yaml
  plan_extraction: prompts/plan_extraction.yaml
prompts_content:
  extraction:
    Cancer_Diagnosis: "TASK: Extract cancer diagnosis details.\n\nFor Type_of_Cancer,\
      \ be SPECIFIC — include as much of the following as the note provides:\n1. Histologic\
      \ subtype: IDC (invasive ductal carcinoma), ILC (invasive lobular carcinoma),\
      \ DCIS, mixed, etc.\n2. Receptor status — ER, PR, and HER2. e.g., \"ER+/PR+/HER2-\"\
      \n3. If receptor status changed between original diagnosis and metastatic/recurrent\
      \ biopsy, note BOTH.\n- Example: \"ER+/PR+/HER2- invasive ductal carcinoma\"\
      \ NOT just \"breast cancer\"\n- Example with change: \"Originally ER+/PR+/HER2-,\
      \ metastatic biopsy ER+/PR-/HER2-\"\nDo NOT write just \"breast cancer\" or\
      \ \"MBC\" — always include the subtype and receptor status when available in\
      \ the note.\n\nHER2 status rules — follow strictly:\n- If the note explicitly\
      \ states HER2 result (positive, negative, equivocal, IHC score, FISH result),\
      \ write it.\n- If HER2 was NOT tested or NOT mentioned in the note, write \"\
      HER2: not tested\" — do NOT guess or assume HER2- or HER2+.\n- DCIS (ductal\
      \ carcinoma in situ) often does NOT have HER2 testing. Do NOT assume HER2- for\
      \ DCIS unless explicitly stated.\n- IMPORTANT: IHC 2+ with FISH NEGATIVE = HER2\
      \ negative. Do NOT write HER2+ for IHC 2+/FISH negative.\n- IMPORTANT: If treatment\
      \ includes Herceptin/trastuzumab/pertuzumab/T-DM1/Tykerb/lapatinib/TCHP/THP,\
      \ the cancer is HER2+. Do NOT write HER2-.\n\nFor Stage_of_Cancer:\n- Write\
      \ the AJCC/TNM stage if stated (e.g., \"Stage IIA\", \"pT2N0M0\", \"Stage IV\"\
      )\n- If the patient was originally diagnosed at one stage but now has metastatic\
      \ recurrence, write BOTH:\n  e.g., \"Originally Stage IIA, now metastatic (Stage\
      \ IV)\"\n- If distant metastases are documented, the current stage is Stage\
      \ IV even if not explicitly stated.\n- If the Assessment/Plan states a stage\
      \ (e.g., \"Stage I\", \"early stage\"), extract it — do NOT write \"Not mentioned\
      \ in note\".\n- If tumor size and node status are available, infer the approximate\
      \ stage (e.g., \"2.3 cm, 0/3 LN negative — approximately Stage I-II\").\n- Only\
      \ write \"Not mentioned in note\" if there is truly NO staging, tumor size,\
      \ or node information anywhere in the note.\n\nRespond *only* with a JSON object\
      \ using this exact schema:\n{\n\"Type_of_Cancer\": \"Specific cancer type with\
      \ histologic subtype and receptor statuses when available. e.g., 'ER+/PR+/HER2-\
      \ invasive ductal carcinoma'\",\n\"Stage_of_Cancer\": \"AJCC stage, or original\
      \ + current if recurred/progressed. e.g., 'Stage IIA' or 'Originally Stage IIA,\
      \ now metastatic (Stage IV)'\",\n\"Distant Metastasis\": \"if there is distant\
      \ metastasis (met). Yes, to where; No; or Not sure. Note: axillary lymph nodes\
      \ are REGIONAL, not distant.\",\n\"Metastasis\": \"if there is met, Yes (to\
      \ where), No, or Not sure\"\n}\n"
    Clinical_Findings: 'TASK: Extract clinical findings and current disease status
      from this visit.


      Summarize NEW clinical findings or current disease status. Include:

      - Key pathology results: tumor size, margins, node status, grade

      - Imaging findings: CT, MRI, PET, bone scan results

      - Physical exam findings: palpable masses, skin changes, lymphadenopathy

      Do NOT write only symptoms (e.g., "patient reports fatigue") — write OBJECTIVE
      findings.

      Do NOT repeat the cancer type or stage (those are extracted separately).


      Respond *only* with a JSON object using this exact schema:

      {

      "findings": "Summary of new findings or disease status including pathology results,
      imaging findings, and exam findings."

      }

      '
    Current_Medications: "TASK: Extract current oncologic medications.\n\nCRITICAL\
      \ — distinguish CURRENT from PLANNED from PAST:\n- CURRENT (include): medications\
      \ the patient is ACTIVELY taking right now.\n  Look for: \"continue\", \"currently\
      \ on\", \"taking daily\", \"on [drug] since [date]\"\n- PLANNED/RECOMMENDED\
      \ (do NOT include): medications discussed, recommended, or scheduled to start.\n\
      \  Look for: \"will start\", \"plan to begin\", \"recommend\", \"discussed\"\
      , \"Rx sent\", \"after [condition]\"\n- PAST/COMPLETED (do NOT include): medications\
      \ already finished or stopped.\n  Look for: \"completed\", \"s/p\", \"stopped\"\
      , \"discontinued\", \"held\", \"finished [N] cycles\"\n\nList ONLY oncologic\
      \ medications the patient is actively taking NOW. Include drug names.\nDo NOT\
      \ include non-cancer medications (blood pressure, diabetes, psychiatric, allergy\
      \ meds).\nDo NOT include medications the patient is \"not taking\" or that are\
      \ marked as discontinued.\nIf no oncologic medications are currently active,\
      \ write empty string.\n\nThink step by step before answering:\n1. List ALL medications\
      \ mentioned in the note.\n2. For each one, determine: Is it oncologic (cancer-related)?\
      \ Is it CURRENT, PLANNED, or PAST?\n3. Only include medications that are BOTH\
      \ oncologic AND currently active.\n\nWrite your reasoning first, then output\
      \ the JSON on a new line starting with {\n\nRespond with a JSON object using\
      \ this exact schema:\n{\n\"current_meds\": \"List of current oncologic medications\
      \ or regimens the patient is ACTIVELY taking now.\"\n}\n"
    Lab_Results: 'TASK: Extract lab results from this medical note.


      List SPECIFIC lab values with numbers (e.g., "Hgb 7.7, Albumin 2.1, Alk Phos
      183, CA 27.29 = 48").

      Include tumor markers (CA 15-3, CA 27.29, CEA) — these ARE lab values.

      Do NOT include: imaging results (CT, MRI, PET, bone scan, echocardiogram/LVEF),
      pathology receptor status (ER%, PR%, HER2 IHC/FISH), genomic test results (Oncotype,
      MammaPrint).

      CRITICAL: Only include lab values that are EXPLICITLY written in the note with
      specific numbers. Do NOT invent or guess lab values. If no lab results appear
      anywhere in the note, write "No labs in note."

      If lab results are older than 6 months, note the date.


      Respond *only* with a JSON object using this exact schema:

      {

      "lab_summary": "Summary of key lab results with specific values. Only include
      blood work and tumor markers, NOT imaging/pathology/genomic tests. If none found,
      write ''No labs in note.''"

      }

      '
    Reason_for_Visit: "TASK: Extract 'Reason for Visit'.\nBe SPECIFIC — include the\
      \ patient's diagnosis, cancer type, and the purpose of this visit.\nDo NOT give\
      \ vague answers like \"new symptoms\" or \"follow up visit\". Instead, state\
      \ what cancer,\nwhat stage (if known), and what specifically brought them in\
      \ (e.g., \"initial consult for newly\ndiagnosed metastatic ER+ breast cancer\"\
      \ or \"cycle 3 day 1 of irinotecan for metastatic TNBC\").\n\nFor Patient type\
      \ — determining \"New patient\" vs \"Follow up\":\n- \"New patient\" if ANY\
      \ of these apply:\n  * Note says \"New Patient Evaluation\", \"Consult Note\"\
      , \"consultation\", \"establish care\", \"referred by\", or \"second opinion\"\
      \n  * This is the patient's FIRST visit to this oncologist/clinic (even if they\
      \ had surgery or treatment elsewhere)\n  * Post-surgery first visit to medical\
      \ oncology to discuss adjuvant/systemic therapy\n- \"Follow up\" ONLY if the\
      \ patient has been seen by THIS provider/clinic before for ongoing management\n\
      - When in doubt, \"New patient\" is safer than \"Follow up\"\n\nFor second opinion\
      \ — write \"yes\" ONLY if the note explicitly mentions \"second opinion\", \"\
      another opinion\", or the patient was clearly referred for an independent review\
      \ of their case. Do NOT guess.\n\nRespond *only* with a JSON object using this\
      \ exact schema:\n{\n\"Patient type\": \"either New patient or follow up\",\n\
      \"second opinion\": \"whether the visit is consultation/second opinion or not\"\
      ,\n\"in-person\": \"either Televisit or in-person. (note, video consult, televisit,\
      \ telehealth are the same thing)\",\n\"summary\": \"A specific summary including\
      \ cancer type, stage if known, and purpose of this visit.\"\n}\n"
    Response_Assessment: 'TASK: Extract how the cancer is CURRENTLY responding to
      treatment.


      Think step by step before answering:

      1. Has this patient started any cancer treatment yet? (surgery alone does not
      count as "treatment" for response assessment purposes)

      2. If yes, what treatment are they on? (chemo, endocrine therapy, targeted therapy,
      immunotherapy)

      3. Is there any evidence of how the cancer is responding? Look for: imaging
      results, tumor markers, clinical exam findings, symptom changes.

      4. If no treatment started yet, write "Not yet on treatment — no response to
      assess."

      5. If on treatment but no response data in the note, write "Not mentioned in
      note."


      STRICT RULES — do NOT violate:

      - Do NOT include future plans ("will start", "plan to", "she will have radiation").

      - Do NOT include treatment discussions or recommendations.

      - Do NOT use generic boilerplate phrases. Every claim must be traceable to a
      specific sentence in the note.

      - Do NOT write "tolerating therapy well" or "symptoms improved" unless the note
      EXPLICITLY uses those exact words.

      - Do NOT describe pathology results (tumor size, grade, margins) as a "response"
      — pathology is a diagnosis, not a treatment response.

      - Do NOT describe surgical recovery ("healing well", "recovering from surgery")
      as a response assessment.

      - Do NOT describe risk estimates or Oncotype scores as a response — those are
      prognostic tools, not treatment responses.

      - Do NOT write "Not applicable" or "Not specified".

      Examples:

      - GOOD: "CT stable, CA 15-3 decreased from 28 to 14"

      - GOOD: "no evidence of disease recurrence on imaging and exam"

      - GOOD: "PET-CT shows stable to slightly decreased metabolic activity of osseous
      metastases"

      - GOOD: "Axillary LN decreased from 8cm to 2-3cm after 2 cycles AC"

      - BAD: "tolerating therapy well, symptoms improved" (generic boilerplate)

      - BAD: "She will continue on letrozole and have radiation" (this is a plan,
      not a response)

      - BAD: "0.9 cm grade 1 IDC, margins negative" (this is pathology, not treatment
      response)

      - BAD: "Healing well from surgery" (surgical recovery, not cancer treatment
      response)

      - BAD: "Low Risk Oncotype score" (prognostic tool, not a response to treatment)


      Write your reasoning first, then output the JSON on a new line starting with
      {


      Respond with a JSON object using this exact schema:

      {

      "response_assessment": "How is the cancer CURRENTLY responding? Cite specific
      evidence: imaging, labs, exam. Do NOT include future plans, surgical recovery,
      or prognostic scores."

      }

      '
    Treatment_Changes: 'TASK: Extract recent treatment changes and supportive medications.


      For recent_changes: Any holds, dose reductions, switches, or newly started medications
      RELATED TO THIS VISIT.

      Do NOT include changes from months or years ago.


      For supportive_meds: List supportive care medications RELATED to cancer treatment
      (anti-nausea, pain meds for cancer pain, bone-protecting agents, growth factors
      like Neulasta/GCSF).

      Do NOT include: allergies (ALL: section), non-cancer comorbidity medications,
      medications marked "Patient not taking".

      IMPORTANT: The ALLERGIES section lists what the patient is ALLERGIC TO — these
      are NOT medications they take.


      Respond *only* with a JSON object using this exact schema:

      {

      "recent_changes": "Any holds, dose reductions, or switches at or near this visit.",

      "supportive_meds": "List of cancer-treatment-related supportive medications."

      }

      '
    Treatment_Goals: "TASK: Extract the goal/intent of cancer treatment.\n\nWrite\
      \ the INTENT of the cancer treatment itself: \"curative\", \"palliative\", \"\
      risk reduction\", \"adjuvant\", or \"symptom management\".\nDo NOT write the\
      \ purpose of this visit (e.g., \"follow-up\", \"discuss treatment options\"\
      , \"review treatment plan\").\n\nThink step by step before answering:\n1. What\
      \ is the cancer stage? (early-stage vs metastatic/Stage IV)\n2. What treatment\
      \ is planned or ongoing? (surgery, chemo, radiation, endocrine therapy)\n3.\
      \ Apply the decision tree:\n   - Early-stage cancer + surgery + adjuvant chemo/radiation/endocrine\
      \ therapy → \"curative\" or \"adjuvant\"\n   - Neoadjuvant chemotherapy before\
      \ surgery for curable cancer → \"curative\" (NOT \"neoadjuvant\")\n   - Metastatic/Stage\
      \ IV cancer → \"palliative\"\n   - DCIS only, no invasive cancer → \"risk reduction\"\
      \n   - Completed curative treatment, now on surveillance endocrine therapy →\
      \ \"adjuvant\" or \"risk reduction\"\n4. Do NOT write \"risk reduction\" for\
      \ early-stage invasive cancer receiving adjuvant chemo — that is \"curative\"\
      \ or \"adjuvant\".\n5. Do NOT write \"neoadjuvant\" as a goal — write \"curative\"\
      \ instead (neoadjuvant is a treatment strategy, not a treatment intent).\n\n\
      Write your reasoning first, then output the JSON on a new line starting with\
      \ {\n\nRespond with a JSON object using this exact schema:\n{\n\"goals_of_treatment\"\
      : \"The intent of cancer treatment: curative, palliative, adjuvant, risk reduction,\
      \ or symptom management. NOT the purpose of this visit.\"\n}\n"
  plan_extraction:
    Advance_care_planning: "TASK: Extract the 'Advance care planning' from the given\
      \ 'Assessment/Plan' section.\nInclude Advance directives, health-care proxy,\
      \ code status (e.g., Full code, DNR/DNI).\nIf a code status is mentioned anywhere\
      \ in the note, include it.\nIf no advance care planning is discussed, say \"\
      Not discussed during this visit.\"\nRespond *only* with a JSON object using\
      \ this exact schema:\n{\n    \"Advance care\": \"A summary of any advance care\
      \ planning including code status, or 'Not discussed during this visit.'\"\n\
      }\n"
    Genetic_Testing_Plan: "TASK: Extract the 'Genetic Testing Plan' from the given\
      \ 'Assessment/Plan' section.\n\n1. Scope of section:\n- First, find the 'Assessment/Plan'\
      \ section of the note (usually the final section).\n- Only look for plans that\
      \ are clearly about FUTURE genetic or molecular TESTING.\n\n2. What COUNTS as\
      \ 'genetic or molecular testing':\n- Diagnostic, prognostic, or predictive laboratory\
      \ assays, such as:\n  - Tumor genomic sequencing / NGS / panel testing\n  -\
      \ Germline genetic panels (e.g., hereditary cancer panel, BRCA testing)\n  -\
      \ Liquid biopsy / circulating tumor DNA (ctDNA) tests\n  - Specific biomarker\
      \ tests (e.g., PD-L1 testing, MSI testing, EGFR mutation testing)\n  - Any plan\
      \ to \"send\", \"order\", \"check\", or \"obtain\" a genetic, genomic, or molecular\
      \ TEST\n\n3. What MUST be EXCLUDED:\n- DO NOT include any medications, systemic\
      \ therapies, or treatment plans:\n  - Chemotherapy, immunotherapy, targeted\
      \ therapies (e.g., FGFR inhibitor, PARP inhibitor, CDK4/6 inhibitor, TKIs)\n\
      \  - Hormonal therapy, radiation therapy, surgery\n  - Clinical trial options,\
      \ even if the trial involves targeted drugs or inhibitors\n- DO NOT include\
      \ tests that are already completed, historic, or only mentioned in past oncology\
      \ history.\n- DO NOT include imaging (CT, PET, MRI, X-ray, ultrasound) or routine\
      \ labs (CBC, CMP).\n\n4. If there is NO new genetic or molecular test planned\
      \ in the Assessment/Plan:\n- Set the value to a clear negative statement, for\
      \ example:\n  \"No new genetic or molecular tests were planned during this visit.\"\
      \n\n5. Output format:\nRespond *only* with a JSON object using this exact schema:\n\
      {\n    \"genetic_testing_plan\": \"A summary of any future planned genetic or\
      \ molecular tests, or a clear statement that none are planned.\"\n}\n"
    Imaging_Plan: "TASK: Extract the 'Imaging Plan' from the given 'Assessment/Plan'\
      \ section.\nInclude ONLY future/planned imaging: CT, MRI, PET/CT, ultrasound,\
      \ DEXA scans, bone scan, X-ray.\nInclude timing and rationale if mentioned (e.g.,\
      \ \"CT in 3 months for restaging\").\n\nCRITICAL — distinguish PAST from FUTURE:\n\
      - PAST (DO NOT include): \"MRI showed lesions\", \"CT on 12/24/2019 showed...\"\
      , \"bone density scan last July showed...\"\n- FUTURE (include): \"will order\
      \ MRI\", \"DEXA in 1 year, due July 2019\", \"scans again in 3 months\", \"\
      annual mammogram next due July 2019\", \"consider brain MRI if worsening\"\n\
      \nDO NOT include any procedure plan, lab plan, or medication plan.\nList SPECIFIC\
      \ imaging types. Do NOT use vague terms like \"staging workup\".\nIf no future\
      \ imaging is planned, say \"No imaging planned.\"\nRespond *only* with a JSON\
      \ object using this exact schema:\n{\n    \"imaging_plan\": \"A summary of any\
      \ planned imaging with specific test names, or 'No imaging planned.'\"\n}\n"
    Lab_Plan: "TASK: Extract the 'lab Plan' from the given 'Assessment/Plan' section.\n\
      Include ONLY future/planned labs: CBC, CMP, tumor markers (CA 15-3, CEA, CA-125,\
      \ PSA), coagulation profile, hepatitis markers, etc.\nSpecify frequency and\
      \ rationale if mentioned.\nDO NOT include past lab results. DO NOT use vague\
      \ terms like \"staging workup\" — list the specific tests ordered.\nIf no future\
      \ labs are planned, say \"No labs planned.\"\nRespond *only* with a JSON object\
      \ using this exact schema:\n{\n    \"lab_plan\": \"A summary of the future lab\
      \ plan with specific test names, or 'No labs planned.'\"\n}\n"
    Medication_Plan: "TASK: Extract the 'Medication Plan' from the given 'Assessment/Plan'\
      \ section.\nInclude future medication plans, changes to current meds (start,\
      \ stop, continue), supportive meds, bowel regimen, and any blood transfusion\
      \ plan. Do not include past medications.\nBe SPECIFIC: list actual drug names,\
      \ doses, and frequencies when mentioned. Do NOT use vague terms like \"will\
      \ start medications\".\nRespond *only* with a JSON object using this exact schema:\n\
      {\n    \"medication_plan\": \"A summary of the complete medication plan with\
      \ specific drug names and doses.\"\n}\n"
    Medication_Plan_chatgpt: "TASK: Extract the 'Medication Plan' from the given 'Assessment/Plan'\
      \ section.\nInclude all current and future medication plans for both cancer\
      \ therapy and supportive treatment. Cancer treatment could be one or many in\
      \ chemotherapy, hormonal therapy, bone therapy, radiotherapy (eg. rad onc, xrt).\
      \ Supportive treatment could be one or many in bowel regimen, pain medication,\
      \ psychiatry medication, neuropathy or any blood transfusion plan.\n\nIMPORTANT\
      \ classification rules:\n- \"bowel regimen\" means laxatives, stool softeners,\
      \ anti-diarrheals (e.g., docusate, miralax, lomotil, imodium). Antibiotics like\
      \ doxycycline are NOT bowel regimen — classify them under \"other treatment\"\
      \ or \"infection management\".\n- \"pain medication\" means analgesics (opioids,\
      \ NSAIDs, muscle relaxants for pain).\n- \"psychiatry medication\" means antidepressants,\
      \ anxiolytics, antipsychotics.\n\nInclude whether a medication is being started\
      \ now (e.g,\"will start\", \"Rx sent\", \"starting today\" ), plan or discuss\
      \ in the future after certain condition (e.g., \"plan to start after radiation\"\
      , \"discussed addition of…\"), continue or maintained(\"continue\"), stop or\
      \ change.\n\nInclude an alterative, second-line or clinical trials options if\
      \ dicussed.\nInclude an 'other treatment' section for any other medications\
      \ that only briefly mentioned in the plan section.\nRespond *only* with a JSON\
      \ object using this exact schema:\n{\n    \"The medication/treatment, one of\
      \ chemotherapy, hormonal therapy, bone therapy, radiotherapy\":\n{\"summary\"\
      :\"the summary of this type of medication, including start/stop/cotinue if applicable\"\
      ,\n\"Short term side_effects_discussed\": \"short term Side effects of this\
      \ particular medications.\",\n\"Long term side_effects_discussed\": \"long term\
      \ Side effects of this particular medications..\"}\n}\n"
    Procedure_Plan: "TASK: Extract the 'Procedure Plan' from the given 'Assessment/Plan'\
      \ section.\nInclude ONLY future/planned procedures: surgery, biopsy, lumbar\
      \ puncture, Chemo Port Insertion, or other interventional procedures.\n\nCRITICAL\
      \ — distinguish PAST from FUTURE:\n- PAST (DO NOT include): \"underwent mastectomy\
      \ on 10/29/16\", \"s/p colectomy in June 2018\", \"had biopsy on 05/25\", \"\
      completed radiation\"\n- FUTURE (include): \"will schedule biopsy\", \"plan\
      \ for port placement\", \"surgery pending\", \"scheduled for colectomy next\
      \ week\"\nIf a procedure has a past date or uses past tense (underwent, had,\
      \ completed, s/p), it is PAST — do NOT include it.\n\nAlso DO NOT include:\n\
      - Imaging plans (CT, MRI, PET — these go in Imaging Plan)\n- Lab plans\n- Medication\
      \ plans\n- Referrals or consultations (e.g., \"XRT consult\" is a referral,\
      \ not a procedure)\nIf no future procedures are planned, say \"No procedures\
      \ planned.\"\nRespond *only* with a JSON object using this exact schema:\n{\n\
      \    \"procedure_plan\": \"A summary of any planned procedures, or 'No procedures\
      \ planned.'\"\n}\n"
    Referral: 'TASK: Extract ''Referral'' from the given ''Assessment/Plan'' section.

      Do not mistake the doctor''s signature at the end of the note as a referral.

      Include ALL referrals mentioned, including integrative medicine, complementary
      medicine, or wellness referrals.

      A "consult" (e.g., "XRT consult", "Rad Onc consult") counts as a Specialty referral.

      If no referral is mentioned for a category, set its value to "None".

      Respond *only* with a JSON object using this exact schema:

      {

      "Nutrition": "any nutrition referrals such as diet optimization, appetite, weight
      maintenance, or ''None''",

      "Genetics": "eg, germline testing, family counseling, or ''None''",

      "Specialty": "eg, Palliative care, Radiation oncology consult, surgical oncology,
      Integrative Medicine, Psychology/psychiatry, or ''None''",

      "Others": "Physical or occupational therapy, Social work, financial counseling,
      home health, or ''None''",

      "follow up": "follow up mentioned in the provided text. f/up, f/p and fup all
      mean follow up."

      }

      '
    Therapy_plan: "TASK: Extract the 'therapy Plan' from the given 'Assessment/Plan'\
      \ section.\nInclude ONLY current or future therapy: chemotherapy, radiotherapy,\
      \ hormonal therapy, and bone-therapy.\nInclude future plans, changes to current\
      \ therapy (start, stop, continue).\n\nCRITICAL — distinguish PAST from CURRENT/FUTURE:\n\
      - PAST (DO NOT include): \"underwent mastectomy in 2016\", \"s/p colectomy\"\
      , \"completed 6 cycles of TCHP\", \"had radiation in 2018\"\n- CURRENT (include):\
      \ \"continue letrozole\", \"currently on irinotecan\", \"taking tamoxifen daily\"\
      \n- FUTURE (include): \"will start\", \"plan to begin\", \"discussed starting\"\
      , \"switch to\"\n\nBe SPECIFIC: include drug names, doses, schedule changes,\
      \ and cycle information when mentioned.\nRespond *only* with a JSON object using\
      \ this exact schema:\n{\n    \"therapy_plan\": \"A summary of the current and\
      \ future therapy plan with specific details.\"\n}\n"
    follow_up_next_visit: "TASK: Extract the 'follow up/next visit' from the given\
      \ 'Assessment/Plan' section.\nBe SPECIFIC about timing (e.g., \"2 weeks\", \"\
      after biopsy results\", \"3 months\").\nRespond *only* with a JSON object using\
      \ this exact schema:\n{\n    \"Next clinic visit\": \"(in-person or telehealth):\
      \ timing and purpose\"\n}\n"
    radiotherapy_plan: "TASK: Extract the 'radiotherapy Plan' from the given 'Assessment/Plan'\
      \ section.\nFor radiotherapy, include ANY statement that indicates\nit is being\
      \ considered, recommended, or may be used, even if no explicit\nstart/continue/plan\
      \ keywords are present.\nInclude referrals to radiation oncology (Rad Onc) as\
      \ a radiotherapy-related plan.\nRespond *only* with a JSON object using this\
      \ exact schema:\n{\n    \"radiotherapy_plan\": \"A summary of any planned or\
      \ discussed radiotherapy, or 'None' if not mentioned.\"\n}\n"

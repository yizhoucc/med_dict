experiment:
  name: "v31_vllm_iter15_test"
  seed: 42

model:
  name: "Qwen/Qwen2.5-32B-Instruct-AWQ"
  chat_template: "qwen2"
  vllm:
    base_url: "http://localhost:8000/v1"

data:
  dataset_path: "data/CORAL/coral-expert-curated-medical-oncology-reports-to-advance-language-model-inference-1.0/coral/unannotated/data/breastca_unannotated.csv"
  # 11 problem samples from iter14 + 4 random regression samples (30%)
  # Problem: ROW 2,22,24,30,57,72,84,85,90,96,99
  # Regression: ROW 3,9,36,91
  row_indices: [1, 2, 8, 21, 23, 29, 35, 56, 71, 83, 84, 89, 90, 95, 98]

prompts:
  extraction: "prompts/extraction.yaml"
  plan_extraction: "prompts/plan_extraction.yaml"
  letter_generation: "prompts/letter_generation.yaml"

extraction:
  pipeline: "v2"
  attribution: false
  letter: true
  tool_calling: false
  max_retries: 3
  verify: true
  gate_config:
    preserve_negatives: true
    skip_empty_fields: true

generation:
  keypoint:
    max_new_tokens: 1024
    do_sample: false
  assessment_plan:
    max_new_tokens: 2048
    do_sample: false
  retry:
    max_new_tokens: 2048
    do_sample: true
    temperature: 0.6
    top_p: 0.9

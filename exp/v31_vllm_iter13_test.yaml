experiment:
  name: "v31_vllm_iter13_test"
  seed: 42

model:
  name: "Qwen/Qwen2.5-32B-Instruct-AWQ"
  chat_template: "qwen2"
  vllm:
    base_url: "http://localhost:8000/v1"

data:
  dataset_path: "data/CORAL/coral-expert-curated-medical-oncology-reports-to-advance-language-model-inference-1.0/coral/unannotated/data/breastca_unannotated.csv"
  # Test P1 fixes: ROW 30 (idx 29), ROW 72 (idx 71), ROW 24 (idx 23), ROW 96 (idx 95)
  row_indices: [23, 29, 71, 95]

prompts:
  extraction: "prompts/extraction.yaml"
  plan_extraction: "prompts/plan_extraction.yaml"
  letter_generation: "prompts/letter_generation.yaml"

extraction:
  pipeline: "v2"
  attribution: false
  letter: true
  tool_calling: false
  max_retries: 3
  verify: true
  gate_config:
    preserve_negatives: true
    skip_empty_fields: true

generation:
  keypoint:
    max_new_tokens: 1024
    do_sample: false
  assessment_plan:
    max_new_tokens: 2048
    do_sample: false
  retry:
    max_new_tokens: 2048
    do_sample: true
    temperature: 0.6
    top_p: 0.9

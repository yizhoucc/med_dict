experiment:
  name: "full_qwen"
  seed: 42

model:
  name: "Qwen/Qwen2.5-32B-Instruct-AWQ"
  chat_template: "qwen2"
  dtype: "bfloat16"
  device_map: "auto"
  cache_dir: "/home/yc/.cache/huggingface"

data:
  dataset_path: "data/CORAL/coral-expert-curated-medical-oncology-reports-to-advance-language-model-inference-1.0/coral/unannotated/data/breastca_unannotated.csv"

prompts:
  extraction: "prompts/extraction.yaml"
  plan_extraction: "prompts/plan_extraction.yaml"
  letter_generation: "prompts/letter_generation.yaml"

extraction:
  pipeline: "v2"
  attribution: true
  letter: true
  max_retries: 3
  verify: true
  gate_config:
    preserve_negatives: true
    skip_empty_fields: true

generation:
  keypoint:
    max_new_tokens: 768
    do_sample: false
  assessment_plan:
    max_new_tokens: 2048
    do_sample: false
  retry:
    max_new_tokens: 2048
    do_sample: true
    temperature: 0.6
    top_p: 0.9

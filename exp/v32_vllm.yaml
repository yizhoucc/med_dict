experiment:
  name: "v32_vllm_test"
  seed: 42

model:
  name: "Qwen/Qwen3.5-35B-A3B-GPTQ-Int4"
  chat_template: "qwen2"
  vllm:
    base_url: "http://localhost:8000/v1"

data:
  dataset_path: "data/CORAL/coral-expert-curated-medical-oncology-reports-to-advance-language-model-inference-1.0/coral/unannotated/data/breastca_unannotated.csv"
  row_indices: [0, 1, 7, 16, 28, 45, 63, 99]

prompts:
  extraction: "prompts/extraction.yaml"
  plan_extraction: "prompts/plan_extraction.yaml"
  letter_generation: "prompts/letter_generation.yaml"

extraction:
  pipeline: "v2"
  attribution: false
  letter: true
  tool_calling: false
  max_retries: 3
  verify: true
  gate_config:
    preserve_negatives: true
    skip_empty_fields: true

generation:
  keypoint:
    max_new_tokens: 768
    do_sample: false
  assessment_plan:
    max_new_tokens: 2048
    do_sample: false
  retry:
    max_new_tokens: 2048
    do_sample: true
    temperature: 0.6
    top_p: 0.9

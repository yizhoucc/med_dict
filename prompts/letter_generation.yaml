patient_letter: |
  TASK: Fill in the template below to create a patient letter summarizing their visit.

  RULES:
  1. Write at an 8th-grade reading level. Use simple, everyday words.
  2. If you must use a medical term, explain it briefly in parentheses.
  3. After EVERY sentence, add a source tag: [source:field_name]
     - Use the exact field name from the input JSON.
     - Multiple fields: [source:field1,field2]
     - Greetings/closings: [source:none]
  4. Cover all important information from the input. Do not skip fields that have real values.
  5. Do NOT add any information not in the input JSON.
  6. Do NOT copy medical jargon verbatim — rephrase in plain language.
  7. Do NOT include exact dosing details (mg, mg/m2, schedules). Just name the treatment.
  8. Do NOT repeat the same information across sections. If two fields say the same thing, mention it once.
  9. Use passive/neutral voice: "You are referred to" NOT "We will refer you to".
  10. If a section has no relevant data (all fields empty/N/A), skip that section entirely.
  11. LAB VALUES — only mention abnormal results. If labs are normal, say "Your blood tests are mostly normal."
  12. ADVANCE CARE — only include if there is meaningful content (Full code, DNR, surrogate). Skip if "Not discussed".
  13. pCR — If findings mention "no residual carcinoma" or "pathologic complete response", tell the patient clearly:
      "After treatment and surgery, no cancer was found in the removed tissue. This is a very good sign."
  14. RESPONSE ASSESSMENT — If results are mixed (some stable, some progressing), mention BOTH.
  15. MEDICAL TERMS — explain these if they appear:
      - lobular carcinoma = "cancer that started in the milk-producing glands"
      - ductal carcinoma = "cancer that started in the milk ducts"
      - mucinous carcinoma = "a type of cancer that makes mucus"
      - neoadjuvant = "treatment given before surgery to shrink the cancer"
      - adjuvant = "treatment given after surgery to prevent the cancer from coming back"
      - seroma = "a pocket of clear fluid that can form after surgery"
      - peritoneum = "the lining of the abdomen (belly area)"
      - axilla/axillary = "armpit area"
      - lumpectomy = "surgery to remove the tumor"
      - mastectomy = "surgery to remove the breast"
      - ALND = "surgery to remove and check the lymph nodes under the arm"
      - oophorectomy/BSO = "surgery to remove the ovaries"
  16. EMOTIONAL SUPPORT — If emotional_context is present, add 1-2 warm sentences near the end.

  TEMPLATE (fill in each section with 1-3 sentences based on the mapped fields):

  Dear Patient, [source:none]
  We hope you are doing well. We are writing this letter to help you understand what happened during your recent visit. [source:none]

  **Why did I come to the clinic?**
  [Fill from: summary, Patient type — e.g. "You came in for a follow-up visit regarding your breast cancer treatment."]
  [IMPORTANT: Do NOT use medical jargon in this section. Replace abbreviations like TCHP, AC, ALND with plain words.]

  **What was discussed?**
  [Fill from: Type_of_Cancer, Stage_of_Cancer, Metastasis, Distant Metastasis, goals_of_treatment, response_assessment, findings]
  [Include cancer type, stage (use "early stage"/"locally advanced"/"advanced stage", never TNM), treatment goals, and how treatment is going if applicable.]
  [CRITICAL: If response_assessment mentions BOTH stable AND new/progressing areas, you MUST mention both. Do NOT only say "stable" when there are also new lesions.]

  **What tests were done or ordered?**
  [Fill from: lab_summary, imaging_plan, lab_plan, genetic_testing_plan]
  [Only mention tests that were actually done or ordered. Skip if none.]

  **What treatment or medication changes were made?**
  [Fill from: current_meds, recent_changes, medication_plan, supportive_meds, radiotherapy_plan, therapy_plan]
  [Combine overlapping drug info into one mention. No dosing details.]

  **What is the plan going forward?**
  [Fill from: procedure_plan, Specialty, Others, Nutrition, Genetics, follow up, Advance care, emotional_context]
  [Include referrals as "You are referred to..." not "We will refer you to..."]
  [If Advance care has meaningful content (e.g. "Full code", "DNR/DNI", surrogate named), include it: "Your advance care status is noted as [status]."]

  Thank you for trusting us with your care. [source:none]
  Please feel free to contact us if you have any questions. [source:none]
  Sincerely, Your Care Team [source:none]

  AVAILABLE FIELD NAMES (only use these in [source:] tags):
  - Patient type, second opinion, in-person, summary
  - Type_of_Cancer, Stage_of_Cancer, Distant Metastasis, Metastasis
  - lab_summary
  - findings
  - current_meds
  - recent_changes, supportive_meds
  - goals_of_treatment
  - response_assessment
  - medication_plan, therapy_plan, radiotherapy_plan
  - procedure_plan
  - imaging_plan
  - lab_plan
  - genetic_testing_plan
  - Nutrition, Genetics, Specialty (radiation oncology, etc.), Others (social work, home health, PT), follow up
  - Advance care
  - emotional_context

  OUTPUT FORMAT:
  - Write PLAIN TEXT only. Do NOT wrap the output in JSON, quotes, or any other format.
  - Every sentence MUST end with [source:field_name] before the next sentence begins.
  - Keep the section headers (**Why did I come to the clinic?** etc.) exactly as shown.

  INPUT JSON:
  {keypoints_json}

  Write the letter now. Plain text with [source:field_name] after EVERY sentence. No JSON wrapper.

patient_letter: |
  TASK: Write a short, clear letter to the patient summarizing their visit.

  RULES:
  1. Write at an 8th-grade reading level. Use simple, everyday words.
  2. If you must use a medical term, explain it in parentheses right after.
     Example: "triple negative breast cancer (a type where the cancer cells lack three common receptors)"
  3. After EVERY sentence, add a source tag in brackets: [source:field_name]
     - Use the exact field name from the input JSON.
     - If a sentence draws from multiple fields, list them: [source:field1,field2]
     - If a sentence is a greeting or closing (Dear Patient, Sincerely), use [source:none]
  4. Cover all important information from the input. Do not skip fields that have real values.
  5. Do NOT add any information that is not in the input JSON. Only use what is given.
  6. Do NOT copy medical jargon verbatim — rephrase in plain language.
  7. Keep the letter concise — aim for 10-20 sentences.
  8. Use a warm, reassuring tone. Address the patient as "you".
  9. Organize the letter in this order:
     - Greeting
     - Visit reason and patient type
     - Cancer diagnosis (type, stage, spread)
     - Test results (labs, findings)
     - Current medications
     - Treatment changes
     - Treatment goals and how treatment is working
     - Plans (medications, procedures, imaging, lab tests, genetic tests)
     - Referrals and follow-up
     - Advance care planning (if applicable)
     - Closing

  10. RECEPTOR STATUS — always explain what ER/PR/HER2 mean in plain words:
     - ER+ or HR+ = "the cancer grows in response to hormones (estrogen)"
     - ER- = "the cancer does not respond to hormones"
     - HER2+ = "the cancer cells have too much of a protein called HER2"
     - HER2- = "the cancer does not have extra HER2 protein"
     - Triple negative = "the cancer cells lack three common receptors"
     CRITICAL: Do NOT say ER+ "does not respond to hormones". ER+ means the OPPOSITE.
  11. LAB VALUES — when summarizing labs:
     - Only say "low" if the value is flagged (L) or below the reference range.
     - Only say "high" if the value is flagged (H) or above the reference range.
     - If unsure, say "your blood tests are mostly normal".
  12. CANCER STAGE — never use TNM notation (pT2N1M0, etc.). Always say:
     - Stage I or II = "early stage"
     - Stage III = "locally advanced"
     - Stage IV = "advanced stage" (and explain that the cancer has spread to other parts of the body)
     Write it as a natural sentence, e.g., "The cancer is at an advanced stage and has spread to your bones."
     BAD: "making it advanced stage, the cancer has spread" (broken grammar)
     GOOD: "The cancer is now at an advanced stage, meaning it has spread to other parts of your body."
  13. Do NOT copy raw medical data into the letter. Simplify everything.
     BAD: "ER 95, PR 5, HER2 2+ FISH negative G1 IDC with nuclear G1 DCIS"
     GOOD: "Your cancer responds to the hormone estrogen but does not have extra HER2 protein."
  14. Do NOT repeat the same information. If two fields say the same thing, mention it only once.
     BAD: "You are taking letrozole." ... "We started you on letrozole."
     GOOD: "We started you on letrozole, a medication that helps prevent the cancer from coming back."
     If current_meds and recent_changes mention the same drug, combine them into one sentence.
  15. MEDICAL TERMS — always explain these terms if they appear:
     - peritoneum = "the lining of the abdomen (belly area)"
     - lobular carcinoma = "cancer that started in the milk-producing glands"
     - ductal carcinoma = "cancer that started in the milk ducts"
     - mucinous carcinoma = "a type of cancer that makes mucus"
     - metaplastic carcinoma = "a rare type of breast cancer"
     - seroma = "a pocket of clear fluid that can form after surgery"
     - adenocarcinoma = "cancer that started in gland cells"
     - neoadjuvant = "treatment given before surgery to shrink the cancer"
     - adjuvant = "treatment given after surgery to prevent the cancer from coming back"
  16. EMOTIONAL SUPPORT — If the input includes an "emotional_context" field,
     add 1-2 warm, supportive sentences near the end of the letter acknowledging
     the patient's feelings. Example: "We understand this is a difficult time,
     and our team is here to support you every step of the way."
     Do NOT be dismissive. Do NOT say "don't worry". Use empathetic language.
  17. RESPONSE ASSESSMENT — If response_assessment has MIXED results (some areas stable, some progressing),
     you MUST mention BOTH the good and bad news. Do NOT only report stable areas while omitting progression.
     BAD: "Recent imaging shows that the cancer is stable." (when brain MRI shows new lesions)
     GOOD: "Scans of your body show the cancer is stable, but a brain scan showed two small new spots."
  18. DOSING — Do NOT include exact dosing details (mg/m2, mg/kg, Day 1/8/15 schedules).
     Patients do not need dosing schedules in a summary letter. Just name the treatment.
     BAD: "Epirubicin 25 mg/m2 on Day 1, Day 8, and Day 15"
     GOOD: "You will continue your Epirubicin treatment."
  19. LAB RELEVANCE — Only mention lab results that are ABNORMAL or clinically significant for the patient.
     Do NOT mention normal values, old results from prior visits, or single irrelevant values.
     BAD: "Your blood tests from 2013 show a normal glucose level."
     GOOD: (omit entirely if labs are normal/old — or say "Your blood tests are mostly normal.")
  20. ADVANCE CARE — If Advance care says "Not discussed during this visit", do NOT include it in the letter.
     Only mention advance care if there is a meaningful status (e.g., "Full code", "DNR/DNI", named a surrogate).

  AVAILABLE FIELD NAMES (only use these in [source:] tags):
  - Patient type, second opinion, in-person, summary
  - Type_of_Cancer, Stage_of_Cancer, Distant Metastasis, Metastasis
  - lab_summary
  - findings
  - current_meds
  - recent_changes, supportive_meds
  - goals_of_treatment
  - response_assessment
  - medication_plan, therapy_plan, radiotherapy_plan
  - procedure_plan
  - imaging_plan
  - lab_plan
  - genetic_testing_plan
  - Nutrition, Genetics, Specialty (radiation oncology, etc.), Others (social work, home health, PT), follow up
  - Advance care
  - emotional_context

  OUTPUT FORMAT:
  - Write PLAIN TEXT only. Do NOT wrap the output in JSON, quotes, or any other format.
  - Every sentence MUST end with [source:field_name] before the next sentence begins.

  EXAMPLE OUTPUT (follow this format exactly):
  Dear Patient, [source:none]
  You visited us for a follow-up about your breast cancer. [source:summary]
  Your cancer is ER+/PR+/HER2- invasive ductal carcinoma. [source:Type_of_Cancer]
  Sincerely, Your Care Team [source:none]

  INPUT JSON:
  {keypoints_json}

  Write the letter now. Plain text with [source:field_name] after EVERY sentence. No JSON wrapper.

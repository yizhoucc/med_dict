patient_letter: |
  TASK: Fill in the template below to create a patient letter summarizing their visit.

  RULES:
  1. Write at an 8th-grade reading level. Use simple, everyday words.
  2. If you must use a medical term, explain it briefly in parentheses.
  3. After EVERY sentence, add a source tag: [source:field_name]
     - Use the exact field name from the input JSON.
     - Multiple fields: [source:field1,field2]
     - Greetings/closings: [source:none]
  4. Include all important clinical information from the input. Do not skip fields that have real values.
  5. Do NOT add any information not in the input JSON. Do NOT invent or generalize.
     CRITICAL: When the input says specific test names (e.g., "ALT, hepatitis B surface antigen, HBV DNA"), keep those EXACT names in the letter. Do NOT replace them with vague terms like "liver tests" or "blood tests". Accuracy comes first — it is better to use the exact medical term than to simplify and change the meaning.
  6. PRESERVE SPECIFIC NAMES: Keep exact names for drugs, lab tests, imaging studies, and procedures from the input JSON. You may add a brief plain-language explanation in parentheses, but do NOT replace the original term.
     - GOOD: "You will be monitored with ALT (a liver enzyme test), hepatitis B surface antigen, and HBV DNA every 4 months."
     - BAD: "You will have blood tests including liver tests and cancer markers."
     - GOOD: "You will have an echocardiogram (a heart ultrasound) every 6 months."
     - BAD: "You will have a heart test."
  7. Do NOT include exact dosing details (mg, mg/m2, schedules). Just name the treatment.
  8. Do NOT repeat the same information across sections. If two fields say the same thing, mention it once.
  9. Use passive/neutral voice: "You are referred to" NOT "We will refer you to".
  10. If a section has no relevant data (all fields empty/N/A), skip that section entirely.
  11. LAB VALUES:
      - If lab_summary says "No labs in note" → do NOT mention blood tests at all.
      - Only mention ABNORMAL lab results that are clinically significant.
      - Do NOT list routine recurring tests unless results changed management.
      - Do NOT say "Your blood tests are mostly normal" — if nothing abnormal, skip labs entirely.
  12. ADVANCE CARE — only include if there is meaningful content (Full code, DNR, surrogate). Skip if "Not discussed".
  13. pCR — If findings mention "no residual carcinoma" or "pathologic complete response":
      - If BOTH breast AND lymph nodes are clear: "After treatment and surgery, no cancer was found in any of the removed tissue. This is a very good sign."
      - If breast is clear BUT lymph nodes still have cancer: "After treatment and surgery, no cancer was found in the breast tissue itself, which is a good sign. However, cancer was still found in some of the lymph nodes."
      - NEVER say "no cancer was found in the removed tissue" if lymph nodes were positive.
      CRITICAL — "Negative margins" vs "No cancer found":
      - "Negative margins" means the EDGES of the removed tissue are free of cancer. The cancer itself WAS found and removed.
      - If pathology shows ANY size of cancer (e.g., "1.2 cm IDC", "3.5 cm residual disease"), the cancer WAS present. Write "the cancer was removed, and the edges of the tissue are clean" — do NOT say "no cancer was found."
      - ONLY say "no cancer was found" if the pathology explicitly says "no residual carcinoma", "pathologic complete response", or "benign" with NO mention of any cancer size.
  14. RESPONSE ASSESSMENT — If results are mixed (some stable, some progressing), mention BOTH.
  15. HANDLING [REDACTED] CONTENT:
      - If a field value is mostly [REDACTED] and you cannot determine what the original content means, SKIP that information rather than generating garbled or nonsensical text.
      - Example: If genetic_testing_plan says "Order an [REDACTED] to provide more information", write "You will have a test to learn more about your cancer" — do NOT try to name the test.
      - Example: If medication_plan says "[REDACTED] + [REDACTED]", write "You will start new medications as discussed with your doctor" — do NOT generate nonsensical drug names.
      - NEVER concatenate partial words from [REDACTED] boundaries. If a word is partially redacted, skip it entirely.
      - NEVER call a test a "medication test" or "medication testing". If the test name is [REDACTED], say "a test" or "a genomic test" — NOT "a medication test". Tests are NOT medications.
      - If [REDACTED] appears where a FACILITY or LOCATION name should be (e.g., "proceed with treatment at [REDACTED]", "treated at [REDACTED]", "[REDACTED] Hospital"), write "your clinic" or "your treatment center" — do NOT write "a medication".
      - If [REDACTED] appears where an ANEMIA TYPE should be (e.g., "[REDACTED] anemia"), write "a type of anemia" — do NOT write "medication-related anemia" unless the note explicitly says so.
      - Common [REDACTED] context clues: "at [REDACTED]" = facility, "in [REDACTED]" = location, "[REDACTED] anemia" = disease name, "[REDACTED] mutation" = gene name.
  16. FACTUAL ACCURACY:
      - HER2 is a PROTEIN (receptor on cancer cells), NOT a medication. Write "a protein called HER2" or "does not have a protein called HER2", NOT "a medication called HER2".
      - "Squamous differentiation" = cancer cells look like skin cells. It is NOT the same as "mucinous" (mucus-producing). Do NOT confuse these.
      - "Metaplastic carcinoma with squamous differentiation" = "a rare type of breast cancer where the cells look like skin cells"
      - When describing imaging results, check if the finding is CURRENT or HISTORICAL. Do NOT present old imaging as new information if the condition has since been treated (e.g., do NOT say "the cancer in your jaw has grown" if the jaw was subsequently treated with radiation and improved).
  17. MEDICAL TERMS — explain these if they appear:
      - lobular carcinoma = "cancer that started in the milk-producing glands"
      - ductal carcinoma = "cancer that started in the milk ducts"
      - mucinous carcinoma = "a type of cancer that makes mucus"
      - neoadjuvant = "treatment given before surgery to shrink the cancer"
      - adjuvant = "treatment given after surgery to prevent the cancer from coming back"
      - seroma = "a pocket of clear fluid that can form after surgery"
      - peritoneum = "the lining of the abdomen (belly area)"
      - axilla/axillary = "armpit area"
      - lumpectomy = "surgery to remove the tumor"
      - mastectomy = "surgery to remove the breast"
      - ALND = "surgery to remove and check the lymph nodes under the arm"
      - oophorectomy/BSO = "surgery to remove the ovaries"
  18. EMOTIONAL SUPPORT:
      - If the input JSON contains an "emotional_context" field with a NON-EMPTY value, add this EXACT sentence near the closing:
        "We understand that this is a challenging time and that managing these health changes can be stressful. We want to reinforce that you are not alone in this process."
      - Do NOT name specific emotions. Do NOT say "anxious", "depressed", "scared", or similar.
      - If there is NO "emotional_context" field or it is empty, do NOT add ANY emotional support sentences.

  TEMPLATE (fill in each section based on the mapped fields):

  Dear Patient, [source:none]
  We hope you are doing well. We are writing this letter to help you understand what happened during your recent visit. [source:none]

  **Why did you come to the clinic?**
  [Fill from: summary, Patient type — e.g. "You came in for a follow-up visit regarding your breast cancer treatment."]
  [IMPORTANT: Do NOT use medical jargon in this section. Replace abbreviations like TCHP, AC, ALND with plain words.]

  **What's new or changed since your last visit?**
  [Fill from: findings, response_assessment, lab_summary (only if ABNORMAL), goals_of_treatment]
  [CRITICAL — FOLLOW-UP vs NEW PATIENT:
   - If Patient type is "Follow up": assume the patient ALREADY understands their primary diagnosis (cancer type, stage, metastasis). Do NOT repeat the diagnosis. Only include:
     * New test results — only if abnormal or if results changed management
     * Disease progression or regression (from response_assessment)
     * A topic the patient explicitly raised (from findings)
     * Do NOT list routine recurring tests with normal results
   - If Patient type is "New patient": include primary diagnosis information (Type_of_Cancer, Stage_of_Cancer, Metastasis, Distant Metastasis, goals_of_treatment) since this is the first time the patient is learning about their diagnosis.]
  [STAGING: If Stage_of_Cancer says "Originally X, now Y" BUT Metastasis is "No" and response_assessment shows no recurrence, this is a STAGING UPDATE, NOT disease progression. Do NOT imply worsening.]
  [METASTASIS: If cancer has spread to 3+ sites, say "has spread to other parts of your body" without listing every organ. Only name specific sites if there are 1-2 sites (e.g. "has spread to your bones").]
  [LYMPH NODE ACCURACY: If Metastasis is "No" and Distant Metastasis is "No", do NOT say "cancer has spread to lymph nodes" UNLESS the pathology section of findings explicitly says lymph nodes are positive (e.g., "2/5 LN positive", "metastatic carcinoma in lymph node"). Enlarged lymph nodes on IMAGING alone (e.g., "axillary lymphadenopathy on CT/PET") do NOT mean the cancer has spread there — they may be reactive or benign. Check pathology, not just imaging.]
  [CRITICAL: If response_assessment mentions BOTH stable AND new/progressing areas, you MUST mention both.]

  **What treatment or medication changes were made?**
  [Fill from: recent_changes, medication_plan, current_meds, supportive_meds, therapy_plan, radiotherapy_plan]
  [IMPORTANT: Include ALL medication changes from medication_plan — list EVERY medication mentioned there, regardless of whether it relates to the primary cancer diagnosis. Include non-oncology medications if they were changed.]
  [Include the REASON for each treatment change when available (e.g., "due to side effects", "because the cancer has progressed", "to help with nausea").]
  [Include medications that are relevant to today's visit. Exclude medications with no changes that are unrelated to today's visit topics.]
  [Combine overlapping drug info into one mention. No dosing details.]

  **What is the plan going forward?**
  [Fill from: radiotherapy_plan, procedure_plan, imaging_plan, lab_plan, genetic_testing_plan, follow up, Specialty, Others, Nutrition, Genetics, Advance care]
  [Include ALL planned future actions:
   - Radiation treatment plans
   - Procedure/surgery plans
   - Imaging studies (CT, MRI, PET, bone scan, mammogram, echocardiogram, etc.)
   - Lab tests planned
   - Genetic testing plans
   - Referrals: "You are referred to..." not "We will refer you to..."
   - Follow-up visit timing
   - Advance care status if meaningful (Full code, DNR/DNI, surrogate)]

  [If emotional_context is present, add EXACTLY: "We understand that this is a challenging time and that managing these health changes can be stressful. We want to reinforce that you are not alone in this process." [source:emotional_context]]
  Thank you for trusting us with your care. [source:none]
  Please feel free to contact us if you have any questions. [source:none]
  Sincerely, Your Care Team [source:none]

  AVAILABLE FIELD NAMES (only use these in [source:] tags):
  - Patient type, second opinion, in-person, summary
  - Type_of_Cancer, Stage_of_Cancer, Distant Metastasis, Metastasis
  - lab_summary
  - findings
  - current_meds
  - recent_changes, supportive_meds
  - goals_of_treatment
  - response_assessment
  - medication_plan, therapy_plan, radiotherapy_plan
  - procedure_plan
  - imaging_plan
  - lab_plan
  - genetic_testing_plan
  - Nutrition, Genetics, Specialty (radiation oncology, etc.), Others (social work, home health, PT), follow up
  - Advance care
  - emotional_context

  OUTPUT FORMAT:
  - Write PLAIN TEXT only. Do NOT wrap the output in JSON, quotes, or any other format.
  - Every sentence MUST end with [source:field_name] before the next sentence begins.
  - Keep the section headers (**Why did you come to the clinic?** etc.) exactly as shown.

  INPUT JSON:
  {keypoints_json}

  Write the letter now. Plain text with [source:field_name] after EVERY sentence. No JSON wrapper.

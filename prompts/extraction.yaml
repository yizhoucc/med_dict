Reason_for_Visit: |
  TASK: Extract 'Reason for Visit'.
  Be SPECIFIC — include the patient's diagnosis, cancer type, and the purpose of this visit.
  Do NOT give vague answers like "new symptoms" or "follow up visit". Instead, state what cancer,
  what stage (if known), and what specifically brought them in (e.g., "initial consult for newly
  diagnosed metastatic ER+ breast cancer" or "cycle 3 day 1 of irinotecan for metastatic TNBC").

  For Patient type — determining "New patient" vs "Follow up":
  - "New patient" if ANY of these apply:
    * Note says "New Patient Evaluation", "Consult Note", "consultation", "establish care", "referred by", or "second opinion"
    * This is the patient's FIRST visit to this oncologist/clinic (even if they had surgery or treatment elsewhere)
    * Post-surgery first visit to medical oncology to discuss adjuvant/systemic therapy
  - "Follow up" ONLY if the patient has been seen by THIS provider/clinic before for ongoing management
  - When in doubt, "New patient" is safer than "Follow up"

  For second opinion — write "yes" ONLY if the note explicitly mentions "second opinion", "another opinion", or the patient was clearly referred for an independent review of their case. Do NOT guess.

  Respond *only* with a JSON object using this exact schema:
  {
  "Patient type": "either New patient or follow up",
  "second opinion": "whether the visit is consultation/second opinion or not",
  "in-person": "either Televisit or in-person. (note, video consult, televisit, telehealth are the same thing)",
  "summary": "A specific summary including cancer type, stage if known, and purpose of this visit."
  }

Cancer_Diagnosis: |
  TASK: Extract cancer diagnosis details.

  For Type_of_Cancer, be MAXIMALLY SPECIFIC — include ALL of the following that the note provides:
  1. Histologic subtype: IDC (invasive ductal carcinoma), ILC (invasive lobular carcinoma), DCIS, mixed, etc.
  2. Receptor status — ER, PR, and HER2. e.g., "ER+/PR+/HER2-"
  3. Grade (e.g., "grade 2", "G3", "high grade") — ALWAYS include if mentioned anywhere in the note
  4. Special features: micropapillary, mucinous, neuroendocrine differentiation, squamous differentiation, etc.
  5. Associated DCIS if present (e.g., "with extensive DCIS", "with high-grade DCIS component")
  6. If receptor status changed between original diagnosis and metastatic/recurrent biopsy, note BOTH.
  7. If this is a recurrence or metastatic disease, mention that (e.g., "with metastatic recurrence to [site]")
  - Example: "ER+/PR+/HER2- grade 2 invasive ductal carcinoma with extensive DCIS" NOT just "ER+/PR+/HER2- IDC"
  - Example with recurrence: "ER+/PR+/HER2- IDC (micropapillary features) with metastatic recurrence (left cervical LN)"
  Do NOT write just "breast cancer" or "MBC" — always include the subtype, receptor status, grade, and special features when available in the note.
  IMPORTANT: Search the ENTIRE note for receptor status — it may appear in PMH, Problem List, Pathology, HPI, Assessment/Plan, or Diagnosis section, not just the Assessment. If ER/PR/HER2 status is stated ANYWHERE, include it. Do NOT omit HER2 status just because it appears only in the Past Medical History.
  IMPORTANT: If the Assessment/Plan says "HR+" or "hormone receptor positive", this means ER+ (and usually PR+). If it says "her 2 negative" or "HER2-" or "*****-", this means HER2 NEGATIVE. Do NOT write "not specified" when the A/P explicitly states receptor status.

  HER2 status rules — follow strictly:
  - If the note explicitly states HER2 result (positive, negative, equivocal, IHC score, FISH result), write it.
  - If HER2 was NOT tested or NOT mentioned in the note, write "HER2: not tested" — do NOT guess or assume HER2- or HER2+.
  - DCIS (ductal carcinoma in situ) often does NOT have HER2 testing. Do NOT assume HER2- for DCIS unless explicitly stated.
  - HER2 IHC scoring — use this table to determine HER2 status:
    IHC 0     = HER2 NEGATIVE
    IHC 1+    = HER2 NEGATIVE
    IHC 2+    = EQUIVOCAL — must check FISH/ISH result:
      IHC 2+ with FISH ratio ≥ 2.0 (or gene copies ≥ 6) = HER2 POSITIVE
      IHC 2+ with FISH ratio < 2.0 (or "FISH negative")  = HER2 NEGATIVE
    IHC 3+    = HER2 POSITIVE
  - FISH interpretation (when reported without IHC):
    FISH ratio ≥ 2.0 = amplified = HER2 POSITIVE
    FISH ratio < 2.0 = not amplified = HER2 NEGATIVE
  - IMPORTANT: If treatment includes Herceptin/trastuzumab/pertuzumab/T-DM1/T-DXd/Tykerb/lapatinib/TCHP/THP/ado-trastuzumab, the cancer is HER2+. Do NOT write HER2-.
  - IMPORTANT: If the note says "triple negative" ANYWHERE (HPI, A/P, diagnosis), that means ER-/PR-/HER2-. Write HER2 as NEGATIVE even if the HER2 IHC/FISH data is [REDACTED] or masked. "Triple negative" is a definitive classification.
  - IMPORTANT: If HER2 IHC/FISH data is [REDACTED] but the Assessment/Plan writes "[REDACTED] negative" in the receptor status line, infer HER2 = negative.
  - IMPORTANT: goserelin (Zoladex) / leuprolide (Lupron) used DURING CHEMOTHERAPY for fertility preservation does NOT indicate ER+. These drugs suppress ovaries to protect eggs during chemo. Only infer ER+ from goserelin/Lupron when it is used as ENDOCRINE THERAPY (adjuvant or palliative, continuous long-term use for hormone suppression). If the note says "goserelin for fertility preservation" or "goserelin during chemotherapy", do NOT add "ER+ (inferred from goserelin)".
  - IMPORTANT: If the patient has MULTIPLE primary cancers (e.g., gastric cancer AND breast cancer), report receptor status ONLY for the BREAST cancer. Do NOT mix receptor status from other cancers. For example, if gastric cancer is HER2+ but breast cancer is HER2-, write HER2- for the breast cancer.
  - RECEPTOR STATUS PRIORITY — when multiple biopsies exist:
    If the patient has had MULTIPLE pathology results (core biopsy, surgical specimen, metastatic biopsy), the MOST RECENT pathology takes priority for current receptor status.
    Always report the CURRENT receptor status first, then note the original if different.
    Example: If core biopsy was ER+/PR+/HER2- but surgical specimen after neoadjuvant shows ER+/PR-/HER2-, write: "ER+/PR-/HER2- (post-neoadjuvant; originally PR+)"
    If metastatic biopsy shows different receptors from the primary, the metastatic biopsy is the CURRENT status.
  - HISTOLOGIC SUBTYPE — do NOT confuse imaging with pathology:
    "lobular mass" or "lobulated mass" on imaging describes the SHAPE of the mass, NOT the histologic subtype.
    Only write "invasive lobular carcinoma" (ILC) if pathology explicitly says "lobular carcinoma" or "ILC".
    If pathology says "adenocarcinoma" or "adenoCA" without specifying ductal or lobular, write the exact pathology term (e.g., "Grade III adenocarcinoma"), NOT "invasive lobular carcinoma".
  - REDACTED HER2 — inference rules:
    If the note says "[REDACTED] negative" or "*****-" in the A/P receptor status line, AND the treatment is endocrine-only (no anti-HER2 drugs), HER2 is NEGATIVE — do NOT write "not tested".
    If the Problem List says "ER+PR+ *****-", the "*****" is HER2 and the "-" means NEGATIVE.
    Only write "HER2: not tested" when there is genuinely NO mention of HER2 testing or results anywhere in the note AND no treatment context to infer from.

  For Stage_of_Cancer:
  - Write the AJCC/TNM stage if stated (e.g., "Stage IIA", "pT2N0M0", "Stage IV")
  - If the patient was originally diagnosed at one stage but now has metastatic recurrence, write BOTH:
    e.g., "Originally Stage [X], now metastatic (Stage IV)"
    IMPORTANT: Only write "Originally Stage [X]" if the note EXPLICITLY states the original stage number (e.g., "Stage IIA at diagnosis"). If the note only says "metastatic recurrence" without specifying the original stage, write just "Metastatic (Stage IV)" — do NOT guess or invent the original stage.
  - If distant metastases are documented, the current stage is Stage IV even if not explicitly stated.
  - If the Assessment/Plan states a stage (e.g., "Stage I", "early stage"), extract it — do NOT write "Not mentioned in note".
  - If tumor size and node status are available, ALWAYS infer the approximate stage — do NOT write "Not mentioned" when you have these data:
    - ≤2cm (T1) + N0 = Stage I (or Stage IA)
    - ≤2cm + N1mi (micromet only) = Stage IB or Stage IIA
    - >2cm ≤5cm (T2) + N0 = Stage IIA
    - >2cm ≤5cm + N1 (1-3 LN+) = Stage IIB
    - >5cm (T3) + any N = at least Stage IIIA
    - 4+ LN+ (N2) = at least Stage IIIA
    - Distant metastasis (M1) = Stage IV
    Example: "0.8 cm IDC, 0/5 LN" → write "Stage IA (inferred from pT1b N0)"
    Example: "2.2 cm, 4/19 LN+" → write "Stage IIIA (inferred from pT2 N2a)"
  - CRITICAL — N classification is based on the NUMBER OF POSITIVE nodes, NOT total nodes examined:
    N1 = 1-3 positive nodes (N1a if macrometastases, N1mi if only micrometastases)
    N2 = 4-9 positive nodes
    N3 = 10+ positive nodes
    Example: "3/28 LN positive" = 3 positive out of 28 examined = N1a (NOT N2)
    Example: "5/12 LN positive" = 5 positive = N2a
    Do NOT confuse total nodes examined with number positive.
  - IMPORTANT: Node-negative ("node neg", "0/N LN+") with small tumor (≤2cm) = Stage I, NOT Stage II.
    Stage II requires either positive lymph nodes OR tumor >2cm. "Early stage node negative" = Stage I.
  - Only write "Not mentioned in note" if there is truly NO staging, tumor size, or node information anywhere in the note.

  Respond *only* with a JSON object using this exact schema:
  {
  "Type_of_Cancer": "Specific cancer type with histologic subtype and receptor statuses when available. e.g., 'ER+/PR+/HER2- invasive ductal carcinoma'",
  "Stage_of_Cancer": "AJCC stage, or original + current if recurred/progressed. e.g., 'Stage IIA' or 'Originally Stage [X], now metastatic (Stage IV)' — only include original stage if explicitly stated in the note. CRITICAL: Axillary, sentinel, supraclavicular, infraclavicular, and internal mammary lymph nodes are REGIONAL for breast cancer — involvement of these nodes alone is Stage III, NOT Stage IV. Only truly DISTANT sites (liver, lung, bone, brain, pleural, peritoneal, contralateral nodes) qualify as M1/Stage IV.",
  "Distant Metastasis": "if there is distant metastasis (met). Yes, to where; No; or Not sure. CRITICAL: For breast cancer, these are REGIONAL nodes (NOT distant): axillary, sentinel, supraclavicular, infraclavicular, internal mammary, chest wall, ipsilateral. Only list truly distant sites (liver, lung, bone, brain, etc.). If imaging describes lesions as 'cysts', 'indeterminate', 'probably benign', do NOT classify as confirmed distant metastasis. CRITICAL: If BIOPSIED lymph nodes showed NON-MALIGNANT findings (granulomatous, sarcoidosis, reactive), they are NOT cancer metastases.",
  "Metastasis": "if there is met, Yes (to where), No, or Not sure. IMPORTANT: Verify biopsy results — sarcoidosis and granulomatous disease in lymph nodes are NOT cancer metastases."
  }

Lab_Results: |
  TASK: Extract lab results from this medical note.

  List SPECIFIC lab values with numbers (e.g., "Hgb 7.7, Albumin 2.1, Alk Phos 183, CA 27.29 = 48").
  Include tumor markers (CA 15-3, CA 27.29, CEA) — these ARE lab values.
  Do NOT include: imaging results (CT, MRI, PET, bone scan, echocardiogram/LVEF), pathology receptor status (ER%, PR%, HER2 IHC/FISH), genomic test results (Oncotype, MammaPrint).
  CRITICAL: Only include lab values that are EXPLICITLY written in the note with specific numbers. Do NOT invent or guess lab values. If no lab results appear anywhere in the note, write "No labs in note."
  IMPORTANT: Search the ENTIRE note for lab values — they may appear in a RESULTS section, not just near the Assessment/Plan. Look for sections labeled "RESULTS", "Labs", "Component Value", or tables with lab names and numeric values.
  IMPORTANT: When multiple lab panels from different dates exist in the note, report the MOST RECENT set.
  IMPORTANT: You MUST return the "lab_summary" key in your JSON. Do NOT return an empty object {}.
  CRITICAL: If lab values are redacted or masked (the ACTUAL NUMBERS are replaced with *****, [REDACTED], or similar placeholders), write "Values redacted" — do NOT fabricate or guess specific numbers. Only report values you can clearly read.
  Example: If the note says "Platelet *****" or "WBC *****", write "Lab values redacted" — do NOT write "Platelet 217" or any invented number.
  Example: If labs section shows "CBC: ***** ***** *****", write "CBC values redacted" — do NOT fill in numbers.
  IMPORTANT: "Values redacted" means the NUMBERS THEMSELVES are replaced by *****. If you can READ specific numeric values (e.g., "118", "9.9", "172"), those are NOT redacted — extract them normally.
  Some notes have ***** in reference ranges, flags, or column formatting (e.g., "118 (*****)" or "9.9 (*****)") — the value itself is still readable, so report it.
  Only write "Values redacted" when the actual numeric results are completely masked and unreadable.
  IMPORTANT: If the ONLY lab values in the note are from more than 6 months before the visit date, write "No labs in note" — old labs are not relevant to the current visit. Do NOT write "Values redacted" for labs from years ago.
  IMPORTANT: If lab results are older than 6 months from the visit date but there are also recent labs, note the date for old results.
  Example: "Hgb 10.7, WBC 3.16 (from 01/29/2021)" — do NOT omit the date for old labs.
  If the note says "labs/markers unremarkable" without specific values, write that verbatim with the date.

  Respond *only* with a JSON object using this exact schema:
  {
  "lab_summary": "Summary of key lab results with specific values from THIS VISIT ONLY. Only include blood work and tumor markers, NOT imaging/pathology/genomic tests. Do NOT include old results from prior years or prior visits. If none found, write 'No labs in note.'"
  }

Clinical_Findings: |
  TASK: Extract clinical findings and current disease status from this visit.

  Summarize NEW clinical findings or current disease status. Include:
  - Key pathology results: tumor size, margins, node status, grade
  - Imaging findings: CT, MRI, PET, bone scan results
  - Physical exam findings: palpable masses, skin changes, lymphadenopathy
  IMPORTANT: Include ALL imaging findings, even those of uncertain significance (e.g., "focal uptake in 6th rib of unclear significance"). Ambiguous findings may indicate early metastasis and must NOT be omitted. If the report says "unclear significance" or "indeterminate", include it with that qualifier.
  Do NOT write only symptoms (e.g., "patient reports fatigue") — write OBJECTIVE findings.
  Do NOT repeat the cancer type or stage (those are extracted separately).

  Respond *only* with a JSON object using this exact schema:
  {
  "findings": "Summary of new findings or disease status including pathology results, imaging findings, and exam findings."
  }

Current_Medications: |
  TASK: Extract current oncologic medications the patient is ACTIVELY taking now.

  CRITICAL — distinguish CURRENT from PLANNED from PAST:
  - CURRENT (include): medications the patient is ACTIVELY taking right now.
    Look for: "continue", "currently on", "taking daily", "on [drug] since [date]"
  - If the HPI mentions one drug (e.g., "started tamoxifen") but the Assessment/Plan says a DIFFERENT
    drug as current (e.g., "continuing on anastrozole"), prefer the Assessment/Plan — it reflects the
    most recent clinical decision. Do NOT list both unless the note clearly says both are concurrent.
  - PLANNED/RECOMMENDED (do NOT include): medications discussed, recommended, or scheduled to start.
    Look for: "will start", "plan to begin", "recommend", "discussed", "Rx sent", "after [condition]", "[drug] planned", "planned [drug]", "followed by [drug]"
    Example: "currently on AC and taxol planned" → AC is CURRENT, taxol is PLANNED → only include AC
    Example: "AC followed by taxol" → AC is CURRENT, taxol is FUTURE → only include AC
  - PAST/COMPLETED (do NOT include): medications already finished or stopped.
    Look for: "completed", "s/p", "stopped", "discontinued", "held", "finished [N] cycles"
  - STOPPED/DROPPED (do NOT include): medications recently discontinued.
    Look for: "recently dropped", "stopped due to", "discontinued", "held", "self D/C", "D/Ced"

  Focus on CANCER-RELATED medications: chemotherapy, hormonal therapy, targeted therapy, immunotherapy, bone-protecting agents.
  Do NOT include general medications like blood pressure, diabetes, psychiatric, allergy, antibiotic, vitamin, or supplement medications.
  IMPORTANT: Only include medications DIRECTLY related to cancer care. This includes:
  - Oncology drugs (chemo, hormonal, targeted, immunotherapy)
  - Supportive care for cancer treatment (anti-nausea, growth factors, bone agents)
  - Pain medications for cancer-related pain
  Do NOT include: eye drops, blood pressure meds, diabetes meds, vitamins, allergy meds, or other non-cancer medications — even if they appear in the medication list.
  If no cancer-related medications are currently active, write empty string "".

  CROSS-REFERENCE: If a "Current Outpatient Medications" or "Current Medications" section exists in the note, use it as your primary reference for verifying which drugs are current. If a drug is in the medication list but described elsewhere as stopped/held, do NOT include it.
  - SELF-MANAGED/UNAUTHORIZED: If the patient obtained medications outside the clinical system (e.g., from another country, alternative medicine clinic, self-administered at home without physician supervision), and the treating physician does NOT endorse or manage these drugs (look for skeptical language like "apparently", "so-called", "claims to be taking", or "discontinue our medications"), do NOT list them in current_meds. Instead, these should go in recent_changes with appropriate context.
  IMPORTANT EXCEPTION: Clinic-administered drugs (IV chemotherapy, injections like leuprolide/zoladex/lupron, infusions) are often NOT listed in the outpatient medication list. If the Assessment/Plan explicitly states the patient is CURRENTLY ON a drug (e.g., "on irinotecan", "continues leuprolide", "started [drug] on [date]" with no discontinuation), include it even if it does not appear in the outpatient medication list.
  IMPORTANT: Search the ENTIRE A/P for drug names. Common patterns: "on leuprolide (OS started [date])", "continues [drug]", "currently on [drug]". List ALL cancer-related drugs, including ovarian suppression (leuprolide, zoladex/goserelin) when used as endocrine therapy.
  IMPORTANT: If the patient SKIPPED, CANCELLED, or MISSED a single dose/cycle of chemotherapy (e.g., "Day 8 cancelled", "missed day 8"), they are still ON that chemotherapy. Missing one infusion does NOT mean the drug is stopped. Only consider a drug STOPPED if the note says "discontinued", "stopped", "changed to [other drug]", or "completed [N] cycles".
  IMPORTANT: Look for the chemo drug name in the HPI OPENING LINE. Phrases like "on Gemzar", "on irinotecan", "on Taxol", "on AC", "started [drug] on [date]" in the HPI mean the patient IS currently on that drug — include it even if the drug is not in the outpatient medication list and even if today's dose was cancelled/skipped.

  Respond *only* with a JSON object using this exact schema:
  {
  "current_meds": "List of current cancer-related medications the patient is ACTIVELY taking now, or empty string if none."
  }

Treatment_Changes: |
  TASK: Extract recent treatment changes and supportive medications.

  For recent_changes: Any holds, dose reductions, switches, or newly started medications RELATED TO THIS VISIT.
  Do NOT include changes from months or years ago.
  IMPORTANT: If the patient IS currently on treatment but there are no recent changes, write an empty string "".
  Do NOT write "Not yet on treatment" if the patient is already taking medication (e.g., tamoxifen, letrozole).
  "Not yet on treatment" is ONLY correct if the patient has never started any cancer treatment.

  For supportive_meds: List supportive care medications the patient is CURRENTLY TAKING that are RELATED to cancer treatment (anti-nausea, pain meds for cancer pain, bone-protecting agents, growth factors like Neulasta/GCSF).

  CRITICAL rules for supportive_meds — read carefully:
  - ONLY include medications the patient is actively taking RIGHT NOW. Look for: "taking", "currently on", "continue", listed in Active Medications.
  - Do NOT include medications that are only DISCUSSED, RECOMMENDED, or HYPOTHETICAL:
    * "could be mitigated with bisphosphonate" = NOT current (hypothetical)
    * "we discussed starting..." = NOT current (discussion only)
    * "may consider..." = NOT current (future possibility)
    * "if side effects occur, could use..." = NOT current (contingency)
  - Do NOT include: allergies, non-cancer medications (blood pressure, diabetes, cholesterol, thyroid, psychiatric meds).
  - Do NOT include medications marked "Patient not taking" or "(Patient not taking: ...)". If the medication list says "Patient not taking", that drug is NOT current — skip it entirely.
  - Do NOT include anxiety/sleep medications (lorazepam, zolpidem) or seizure medications (levetiracetam) unless explicitly prescribed FOR cancer treatment side effects.
  - Do NOT include ONCOLOGIC drugs (tamoxifen, letrozole, anastrozole, trastuzumab, etc.) in supportive_meds. These go in current_meds.
  IMPORTANT: The ALLERGIES section lists what the patient is ALLERGIC TO — these are NOT medications they take.

  Respond *only* with a JSON object using this exact schema:
  {
  "recent_changes": "Any holds, dose reductions, or switches at or near this visit.",
  "supportive_meds": "List of cancer-treatment-related supportive medications."
  }

Treatment_Goals: |
  TASK: Extract the goal/intent of cancer treatment.

  Write the INTENT of the cancer treatment itself: "curative", "palliative", "risk reduction", "adjuvant", or "symptom management".
  Do NOT write the purpose of this visit (e.g., "follow-up", "discuss treatment options", "review treatment plan").

  FIRST — check the note for EXPLICIT intent words:
  - If the note says "palliative" or "palliative intent" or "palliative care" → write "palliative". Done.
  - If the note says "curative" or "curative intent" → write "curative". Done.
  - If the note says "adjuvant" → this describes the treatment TYPE, not the GOAL. For non-metastatic cancer, adjuvant treatment has curative intent → write "curative". Only write "palliative" if metastatic.
  - If the note explicitly states an intent, USE IT. Do NOT override the physician's own words.

  ONLY if no explicit intent word is found, use this decision tree:
  - Early-stage cancer + surgery + adjuvant chemo/radiation/endocrine therapy → "curative" or "adjuvant"
  - Neoadjuvant chemotherapy before surgery for curable cancer → "curative" (NOT "neoadjuvant")
  - Metastatic/Stage IV cancer → "palliative"
  - DCIS only, no invasive cancer → "risk reduction"
  - Completed curative treatment, now on surveillance endocrine therapy → "adjuvant" or "risk reduction"
  - Do NOT write "risk reduction" for early-stage invasive cancer receiving adjuvant chemo — that is "curative" or "adjuvant".
  - Do NOT write "neoadjuvant" as a goal — write "curative" instead.

  Respond *only* with a JSON object using this exact schema (NO other keys):
  {
  "goals_of_treatment": "curative, palliative, adjuvant, risk reduction, or symptom management"
  }

Response_Assessment: |
  TASK: Extract how the cancer is CURRENTLY responding to treatment.

  Think step by step before answering:
  1. Has this patient started any cancer treatment yet? (surgery alone does not count as "treatment" for response assessment purposes)
     CRITICAL EXCEPTION — POST-NEOADJUVANT SURGERY: If the patient received neoadjuvant therapy (chemo, targeted therapy, etc.) BEFORE surgery, the surgical pathology IS the response assessment. Describe the pathologic response:
     - Residual tumor size and cellularity (e.g., "3.84 cm residual tumor, 5% cellularity")
     - Lymph node status post-treatment (e.g., "3/28 LN positive with treatment effect")
     - Whether pathologic complete response (pCR) was achieved or not
     Do NOT write "Not yet on treatment" for a patient who completed neoadjuvant therapy and had surgery.
     This includes patients who had PROGRESSION on neoadjuvant therapy and then went to surgery — the progression itself IS the response (e.g., "disease progressed on neoadjuvant AC/T, proceeded to bilateral mastectomies"). Describe BOTH the treatment response AND the surgical pathology.
     IMPORTANT: Completed radiation therapy COUNTS as treatment. If the patient recently finished radiation, they HAVE received treatment — do NOT write "Not yet on treatment". "Not yet on treatment" is ONLY correct if no cancer treatment (chemo, radiation, hormonal, targeted, immunotherapy) has been given at all.
     IMPORTANT: A patient who was on PREVIOUS treatment and now shows disease PROGRESSION or RECURRENCE — that IS a response assessment (the response is "progression"). Even if they are switching to a new regimen or between treatments, document the current disease status from imaging/labs.
     For LOCAL RECURRENCE: describe the recurrence factually (e.g., "local recurrence in left breast, 1.7cm IDC on excisional biopsy"). Do NOT write "cancer is not responding to treatment" — the patient may have discontinued treatment or completed it years ago. Focus on WHAT happened (recurrence), not WHY.
     IMPORTANT: For patients on adjuvant/maintenance therapy, "no evidence of recurrence" or "no evidence of disease" on exam or imaging IS a valid response assessment — it means the treatment is working.
     IMPORTANT — the patient IS on treatment if ANY of these clues appear:
     - "currently on [drug]", "taking [drug]", "continue [drug]", "on [drug] since [date]"
     - Mentions of chemotherapy cycles, off weeks, dose adjustments (e.g., "off week", "cycle 3", "due to start next cycle")
     - "labs okay to proceed with chemotherapy" or similar pre-cycle clearance
     - Current medications include any oncologic drug (chemo, hormonal, targeted, immunotherapy)
     - Active medication list contains chemotherapy drugs (Xeloda, ixabepilone, paclitaxel, etc.)
     Do NOT be confused by "off week" — a patient on an off week between chemo cycles IS on treatment.
  2. If yes, what treatment are they on? (chemo, endocrine therapy, targeted therapy, immunotherapy)
  3. Is there any evidence of how the cancer is responding? Search the ENTIRE note for ANY of these:
     - Imaging: CT stable, PET response, scan results
     - Tumor markers: CA 15-3, CEA rising or falling
     - Physical exam: mass shrinking, "breaking up", palpable changes, skin changes improving
     - Clinical status: "labs okay to proceed" (implies stable enough to continue)
     - Symptom changes: "able to do more", "pain improving", "up and about"
     Even brief exam comments like "area appears to be breaking up" count as response evidence.
  4. If no treatment started yet, write "Not yet on treatment — no response to assess."
  5. If on treatment but no response data in the note, write "Not mentioned in note."
     BEFORE writing "Not mentioned", verify there is truly NO evidence anywhere in the note. These ALL count as response evidence:
     - "stopped [drug] for progression" or "disease progressed on [drug]" → response is PROGRESSION
     - New metastatic sites (brain, lung, liver, bone mets) → response is PROGRESSION
     - "exam stable" or "no new findings" → response is STABLE DISEASE
     - Tumor marker trends (rising or falling)
     - Post-surgical pathology after neoadjuvant therapy
     If ANY of the above is present, do NOT write "Not mentioned" — describe the evidence.
  6. TEMPORAL ATTRIBUTION — critical rule:
     When citing imaging (PET, CT, MRI, bone scan), verify the scan was done AFTER the current treatment regimen started.
     If the patient switched treatments (e.g., from letrozole to Faslodex), a scan done BEFORE the switch reflects the PRIOR treatment's response, not the current one.
     Example: PET on 10/10 showed progression → patient switched to Faslodex on 10/16 → current visit exam says "stable" → the response on CURRENT treatment is "exam stable", NOT "PET showed progression on Faslodex."
  7. "JUST PRESCRIBED" ≠ "ON TREATMENT":
     If a medication was PRESCRIBED or ORDERED at THIS visit (e.g., "Rx for letrozole given", "prescription ordered", "will start", "instructed to begin"), the patient has NOT yet started treatment. Write "Not yet on treatment — no response to assess."
     "On treatment" requires the patient to have ACTUALLY BEEN TAKING the medication for some time.
     Clues that treatment has NOT started: "will begin", "Rx given today", "instructed to start", "prescription ordered", "ok to start", "she can start immediately"
  8. A/P ASSESSMENT TAKES PRIORITY:
     If the A/P section contains an explicit current assessment like "Exam stable", "doing well", "NED", "no evidence of recurrence", or "no evidence of disease", prioritize THIS over historical imaging data from earlier in the note.
     The A/P represents the physician's CURRENT assessment at this visit. Historical imaging in the HPI/Problem List may be from BEFORE the current treatment regimen.

  STRICT RULES — do NOT violate:
  - Do NOT include future plans ("will start", "plan to", "she will have radiation").
  - Do NOT include treatment discussions or recommendations.
  - Do NOT use generic boilerplate phrases. Every claim must be traceable to a specific sentence in the note.
  - Do NOT write "tolerating therapy well" or "symptoms improved" unless the note EXPLICITLY uses those exact words.

Reason_for_Visit: |
  TASK: Extract 'Reason for Visit'.
  Be SPECIFIC — include the patient's diagnosis, cancer type, and the purpose of this visit.
  Do NOT give vague answers like "new symptoms" or "follow up visit". Instead, state what cancer,
  what stage (if known), and what specifically brought them in (e.g., "initial consult for newly
  diagnosed pancreatic adenocarcinoma" or "cycle 3 day 1 of FOLFIRINOX for metastatic PDAC").
  CRITICAL RULE: Do NOT add, assume, or generalize any details not in the original note.
  If something is redacted (*****), write "[REDACTED]" — do NOT guess or fill in.
  If biopsy has not been done, do NOT call a mass "cancer" — call it a "mass" or "lesion".
  If a specific test name is not mentioned, do NOT assume which test.

  For Patient type — determining "New patient" vs "Follow up":
  - "New patient" if ANY of these apply:
    * Note says "New Patient Evaluation", "Consult Note", "consultation", "establish care", "referred by", or "second opinion"
    * This is the patient's FIRST visit to this oncologist/clinic (even if they had surgery or treatment elsewhere)
    * Post-surgery first visit to medical oncology to discuss systemic therapy
  - "Follow up" ONLY if the patient has been seen by THIS provider/clinic before for ongoing management
  - When in doubt, "New patient" is safer than "Follow up"

  For second opinion — write "yes" ONLY if the note explicitly mentions "second opinion", "another opinion", or the patient was clearly referred for an independent review of their case. Do NOT guess.

  Respond *only* with a JSON object using this exact schema:
  {
  "Patient type": "either New patient or follow up",
  "second opinion": "whether the visit is consultation/second opinion or not",
  "in-person": "either Televisit or in-person. (note, video consult, televisit, telehealth are the same thing)",
  "summary": "A specific summary including cancer type, stage if known, and purpose of this visit."
  }

Cancer_Diagnosis: |
  TASK: Extract cancer diagnosis details.

  For Type_of_Cancer, be MAXIMALLY SPECIFIC — include ALL of the following that the note provides:
  1. Histologic subtype: adenocarcinoma, neuroendocrine tumor/carcinoma, acinar cell carcinoma, squamous cell carcinoma, melanoma, etc.
  2. Grade (e.g., "grade 2", "G3", "high grade", "well-differentiated", "poorly differentiated") — ALWAYS include if mentioned anywhere in the note
  3. Special features: perineural invasion, lymphovascular invasion, signet ring features, etc.
  4. If this is a recurrence or metastatic disease, mention that (e.g., "with metastatic disease to liver")
  5. TUMOR ORIGIN: Write the EXACT organ/site of origin as stated in the note. Do NOT assume "pancreatic" — the tumor may originate from: pancreas, duodenum, ampulla, bile duct, stomach, or other sites. Write what the note says.
  6. MULTIPLE CANCERS: If the patient has more than one cancer (e.g., pancreatic NET AND melanoma), list ALL cancers separated by semicolons. Example: "Pancreatic neuroendocrine tumor; BRAF-mutant metastatic melanoma"
  - Example: "Poorly differentiated pancreatic ductal adenocarcinoma with perineural invasion"
  - Example: "Pancreatic neuroendocrine tumor, grade 2, well-differentiated"
  - Example: "High-grade neuroendocrine tumor of duodenal/ampullary origin"
  - Example: "Pancreatic NET; BRAF-mutant melanoma (two separate primary cancers)"
  Do NOT write just "pancreatic cancer" — always include the subtype and grade when available in the note.
  IMPORTANT: Search the ENTIRE note for diagnosis details — they may appear in PMH, Problem List, Pathology, HPI, Assessment/Plan, or Diagnosis section.

  For Stage_of_Cancer:
  - Write the AJCC/TNM stage if stated (e.g., "Stage IIB", "T3N1M0", "Stage IV")
  - If the patient was originally diagnosed at one stage but now has metastatic recurrence, write BOTH:
    e.g., "Originally Stage IIB, now metastatic (Stage IV)"
    IMPORTANT: Only write "Originally Stage [X]" if the note EXPLICITLY states the original stage number. If the note only says "metastatic recurrence" without specifying the original stage, write just "Metastatic (Stage IV)" — do NOT guess.
  - If distant metastases are documented, the current stage is Stage IV even if not explicitly stated.
  - If the Assessment/Plan states a stage, extract it — do NOT write "Not mentioned in note".
  - Pancreatic cancer staging considerations:
    - Resectable vs borderline resectable vs locally advanced vs metastatic is a key classification
    - "Locally advanced" typically means Stage III (unresectable but no distant mets)
    - Vascular involvement (SMA, SMV, celiac axis, portal vein) determines resectability
    - If tumor involves major vessels and is described as "unresectable" or "locally advanced", note this
  - RESECTED METASTASIS + NED: If a patient had prior metastasis that was surgically resected and current imaging shows NO evidence of disease (NED), do NOT write "now metastatic (Stage IV)". Instead write the CURRENT status: e.g., "Originally Stage IB, had pulmonary metastasis (resected 2017), currently no evidence of disease". The staging should reflect the CURRENT clinical reality.
  - CRITICAL — DO NOT FABRICATE STAGE NUMBERS:
    * Only write "Stage IA", "Stage IB", "Stage IIA", "Stage IIB", "Stage III", "Stage IV" if the note EXPLICITLY uses that exact stage designation.
    * If the note says "Stage IB", write "Stage IB" — do NOT change it to "Stage IIB".
    * If the note has pTN notation (e.g., "pT3N1") but does NOT state a stage name, write the pTN notation: "pT3N1" — do NOT convert to "Stage IIB" or any AJCC stage name. The conversion from pTN to AJCC stage requires clinical judgment and should NOT be done by extraction.
    * If the note mentions NO stage and NO pTN, write "Not staged in note" or describe what IS available (e.g., "Metastatic disease at diagnosis", "Borderline resectable").
    * Common mistake: writing "Originally Stage IIB" when the note never says "IIB". This is FABRICATION.
    * Another common mistake: the note says "pT3 N1" and you write "Originally Stage IIB". pT3N1 is NOT the same as "Stage IIB" — do NOT make this conversion. Write "pT3N1" exactly as stated.
  - Only write "Not mentioned in note" if there is truly NO staging or tumor information anywhere in the note.

  Respond *only* with a JSON object using this exact schema:
  {
  "Type_of_Cancer": "Specific cancer type with histologic subtype and grade when available. e.g., 'Poorly differentiated pancreatic ductal adenocarcinoma'",
  "Stage_of_Cancer": "AJCC stage, resectability status, or original + current if recurred/progressed. e.g., 'Stage IIB (borderline resectable)' or 'Stage IV (metastatic to liver)'",
  "Distant Metastasis": "if there is distant metastasis (met). Yes, to where; No; or Not sure. Common PDAC met sites: liver, peritoneum, lung. Only list confirmed malignant sites.",
  "Metastasis": "if there is met, Yes (to where), No, or Not sure. IMPORTANT: Verify biopsy results when available."
  }

Lab_Results: |
  TASK: Extract lab results from this medical note.

  List SPECIFIC lab values with numbers (e.g., "Hgb 7.7, Albumin 2.1, Alk Phos 183, CA 19-9 = 548").
  Include tumor markers (CA 19-9, CEA) — these ARE lab values.
  Do NOT include: imaging results (CT, MRI, PET, bone scan), pathology results, genomic test results.
  CRITICAL: Only include lab values that are EXPLICITLY written in the note with specific numbers. Do NOT invent or guess lab values. If no lab results appear anywhere in the note, write "No labs in note."
  IMPORTANT: Search the ENTIRE note for lab values — they may appear in a RESULTS section, not just near the Assessment/Plan. Look for sections labeled "RESULTS", "Labs", "Component Value", or tables with lab names and numeric values.
  IMPORTANT: When multiple lab panels from different dates exist in the note, report the MOST RECENT set.
  IMPORTANT: You MUST return the "lab_summary" key in your JSON. Do NOT return an empty object {}.
  CRITICAL: If lab values are redacted or masked (the ACTUAL NUMBERS are replaced with *****, [REDACTED], or similar placeholders), write "Values redacted" — do NOT fabricate or guess specific numbers.
  IMPORTANT: If the ONLY lab values in the note are from more than 6 months before the visit date, write "No labs in note" — old labs are not relevant to the current visit.

  Respond *only* with a JSON object using this exact schema:
  {
  "lab_summary": "Summary of key lab results with specific values from THIS VISIT ONLY. Only include blood work and tumor markers, NOT imaging/pathology/genomic tests. If none found, write 'No labs in note.'"
  }

Clinical_Findings: |
  TASK: Extract clinical findings and current disease status from this visit.

  Summarize NEW clinical findings or current disease status. Include:
  - Key pathology results: tumor size, margins, node status, grade
  - Imaging findings: CT, MRI, PET, bone scan results
  - Physical exam findings: palpable masses, jaundice, ascites, weight loss
  IMPORTANT: Include ALL imaging findings, even those of uncertain significance. Ambiguous findings may indicate early metastasis and must NOT be omitted. If the report says "unclear significance" or "indeterminate", include it with that qualifier.
  Do NOT write only symptoms (e.g., "patient reports fatigue") — write OBJECTIVE findings.
  Do NOT repeat the cancer type or stage (those are extracted separately).

  Respond *only* with a JSON object using this exact schema:
  {
  "findings": "Summary of new findings or disease status including pathology results, imaging findings, and exam findings."
  }

Current_Medications: |
  TASK: Extract current oncologic medications the patient is ACTIVELY taking now.

  CRITICAL — distinguish CURRENT from PLANNED from PAST:
  - CURRENT (include): medications the patient is ACTIVELY taking right now.
    Look for: "continue", "currently on", "taking daily", "on [drug] since [date]"
  - If the HPI mentions one drug but the Assessment/Plan says a DIFFERENT drug as current, prefer the Assessment/Plan.
  - PLANNED/RECOMMENDED (do NOT include): medications discussed, recommended, or scheduled to start.
    Look for: "will start", "plan to begin", "recommend", "discussed", "Rx sent", "after [condition]"
  - PAST/COMPLETED (do NOT include): medications already finished or stopped.
    Look for: "completed", "s/p", "stopped", "discontinued", "held", "finished [N] cycles"

  Focus on CANCER-RELATED medications: chemotherapy, targeted therapy, immunotherapy, supportive care.
  Do NOT include general medications like blood pressure, diabetes, psychiatric, allergy medications.
  IMPORTANT: Only include medications DIRECTLY related to cancer care.
  If no cancer-related medications are currently active, write empty string "".

  CROSS-REFERENCE: If a "Current Outpatient Medications" section exists, use it as primary reference.
  IMPORTANT EXCEPTION: Clinic-administered drugs (IV chemotherapy, injections, infusions) may NOT be in the outpatient medication list. If the A/P states the patient is CURRENTLY ON a drug, include it.
  IMPORTANT: If the patient SKIPPED or MISSED a single dose/cycle, they are still ON that drug.
  CRITICAL — DO NOT HALLUCINATE DRUG NAMES: Only list drugs the patient is CURRENTLY TAKING. Do NOT confuse:
  - Literature citations in the A/P (e.g., "capecitabine/temozolomide was reported to have 70% response rate") — these are NOT the patient's medications
  - Future treatment options being discussed (e.g., "could consider everolimus") — these are NOT current medications
  - Past completed medications (e.g., "s/p 6 cycles of FOLFIRINOX") — these are NOT current
  Always verify: is the drug listed in the Current Medications section OR explicitly stated as currently being administered?
  IMPORTANT: If the A/P section mentions specific chemotherapy drug names being given, continued, or dose-adjusted (e.g., "Oxaliplatin 49 mg/m2", "continue gemcitabine", "irinotecan reduced"), those drugs ARE current cancer medications — include them even if the drug names are not in the outpatient medication list.
  IMPORTANT: If drug names are [REDACTED] or masked (*****), write "[REDACTED]" — do NOT leave current_meds empty when the patient is clearly on active chemotherapy.

  Respond *only* with a JSON object using this exact schema:
  {
  "current_meds": "List of current cancer-related medications the patient is ACTIVELY taking now, or empty string if none."
  }

Treatment_Changes: |
  TASK: Extract recent treatment changes and supportive medications.

  For recent_changes: Any holds, dose reductions, switches, or newly started medications RELATED TO THIS VISIT.
  Do NOT include changes from months or years ago.
  IMPORTANT: If the patient IS currently on treatment but there are no recent changes, write an empty string "".
  Do NOT write "Not yet on treatment" if the patient is already taking medication.
  "Not yet on treatment" is ONLY correct if the patient has never started any cancer treatment.

  For supportive_meds: List supportive care medications the patient is CURRENTLY TAKING that are RELATED to cancer treatment (anti-nausea, pain meds for cancer pain, pancreatic enzyme replacement like Creon, growth factors).

  CRITICAL rules for supportive_meds:
  - ONLY include medications the patient is actively taking RIGHT NOW.
  - Do NOT include medications that are only DISCUSSED, RECOMMENDED, or HYPOTHETICAL.
  - Do NOT include: allergies, non-cancer medications.
  - Do NOT include medications marked "Patient not taking".
  IMPORTANT: The ALLERGIES section lists what the patient is ALLERGIC TO — these are NOT medications they take.

  Respond *only* with a JSON object using this exact schema:
  {
  "recent_changes": "Any holds, dose reductions, or switches at or near this visit.",
  "supportive_meds": "List of cancer-treatment-related supportive medications."
  }

Treatment_Goals: |
  TASK: Extract the goal/intent of cancer treatment.

  Write the INTENT of the cancer treatment itself: "curative", "palliative", "risk reduction", "adjuvant", "surveillance", or "symptom management".
  Do NOT write the purpose of this visit (e.g., "follow-up", "discuss treatment options").

  FIRST — check the note for EXPLICIT intent words:
  - If the note says "palliative" or "palliative intent" → write "palliative". Done.
  - If the note says "curative" or "curative intent" → write "curative". Done.
  - If the note explicitly states an intent, USE IT. Do NOT override the physician's own words.

  ONLY if no explicit intent word is found, use this decision tree:
  - Resectable pancreatic cancer + surgery + adjuvant chemo → "curative" or "adjuvant"
  - Neoadjuvant chemotherapy before surgery for resectable/borderline resectable → "curative"
  - Locally advanced unresectable → often "palliative" but may be "curative" if downstaging is the goal
  - Metastatic/Stage IV cancer → "palliative"
  - Patient COMPLETED all treatment and is now on surveillance/monitoring with NO active therapy → "surveillance"
    Key clues for surveillance: "continue on surveillance", "will see again in 6 months", "no active treatment", "monitoring", "NED", "no evidence of disease"
  - Do NOT write "neoadjuvant" as a goal — write "curative" instead.
  - Do NOT write "adjuvant" if adjuvant therapy was completed years ago and the patient is now on surveillance.
  - Do NOT write "curative" if the patient already completed curative-intent treatment and is now in long-term follow-up with no active therapy — write "surveillance" instead.

  Respond *only* with a JSON object using this exact schema (NO other keys):
  {
  "goals_of_treatment": "curative, palliative, adjuvant, risk reduction, surveillance, or symptom management"
  }

Response_Assessment: |
  TASK: Extract how the cancer is CURRENTLY responding to treatment.

  Think step by step before answering:
  1. Has this patient started any cancer treatment yet? (surgery alone does not count as "treatment" for response assessment purposes)
     CRITICAL EXCEPTION — POST-SURGERY: If the patient received neoadjuvant therapy BEFORE surgery, the surgical pathology IS the response assessment.
     IMPORTANT: Completed radiation therapy COUNTS as treatment.
     IMPORTANT: A patient who was on PREVIOUS treatment and now shows disease PROGRESSION or RECURRENCE — that IS a response assessment.
  2. If yes, what treatment are they on?
  3. Is there any evidence of how the cancer is responding? Search the ENTIRE note for ANY of these:
     - Imaging: CT stable, PET response, scan results
     - Tumor markers: CA 19-9, CEA rising or falling
     - Physical exam: palpable changes, ascites, jaundice improvement
     - Clinical status: "labs okay to proceed" (implies stable enough to continue)
  4. If no treatment started yet, write "Not yet on treatment — no response to assess."
  5. If on treatment but no response data in the note, write "Not mentioned in note."

  STRICT RULES — do NOT violate:
  - Do NOT include future plans ("will start", "plan to").
  - Do NOT use generic boilerplate phrases.
  - Do NOT write "tolerating therapy well" unless the note EXPLICITLY uses those exact words.
  - Do NOT use the word "responding" unless you can cite SPECIFIC imaging or tumor marker evidence.
  - IMPORTANT: "responding" implies MEASURABLE IMPROVEMENT. Use "stable disease" for unchanged findings.
  - Do NOT describe pathology results as a "response" — pathology is a diagnosis.
  - Do NOT describe surgical recovery as a response assessment.

  Write your reasoning first, then output the JSON on a new line starting with {
  IMPORTANT: Your JSON must contain ONLY the key "response_assessment". Do NOT add any other keys.

  Respond with a JSON object using this exact schema (NO other keys):
  {
  "response_assessment": "How is the cancer CURRENTLY responding? Be DETAILED — cite specific evidence."
  }

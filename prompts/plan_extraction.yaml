Medication_Plan: |
  TASK: Extract the 'Medication Plan' from the given 'Assessment/Plan' section.
  CRITICAL: Do NOT add, assume, or generalize details not in the original note. If a drug name is redacted (*****), write "[REDACTED]" or "unspecified agent". Do NOT guess what test or drug it might be. Only extract what is explicitly written.
  Include future medication plans, changes to current meds (start, stop, continue), supportive meds, bowel regimen, and any blood transfusion plan (e.g., "1 unit pRBC", "2 units packed red blood cells", "transfusion today"). Do not include past medications.
  CRITICAL — distinguish PAST from CURRENT/FUTURE:
  - "s/p weekly taxol x 12" means taxol is COMPLETED. "S/p" or "status post" ALWAYS means COMPLETED/PAST — do NOT list these as current or future.
  - Only include drugs explicitly current (continue, currently on) or future (will start, plan to begin).
  Be SPECIFIC: list actual drug names, doses, and frequencies when mentioned. Do NOT use vague terms like "will start medications".
  IMPORTANT: If a drug name is redacted/masked (shown as *****), write "unspecified agent" — do NOT guess the drug name. Do NOT write "Pertuzumab", "T-DM1", or any specific drug name that is not explicitly written in the note.
  COMPREHENSIVENESS CHECK — before outputting, re-read the entire A/P and verify you captured ALL of the following:
  1. Every drug being STARTED or prescribed (e.g., "Rx for letrozole given", "start palbociclib")
  2. Every drug being CONTINUED (e.g., "continue Prolia", "stay on tamoxifen")
  3. Every supportive medication (e.g., "Claritin for 5-6 days", "prilosec 40mg qd", "antiemetics")
  4. Dose/frequency changes (e.g., "reduce GCSF to 50%", "change to every other week")
  5. Contingency plans (e.g., "if HER2+, will need anti-HER2 therapy", "if progression, consider xeloda")
  If you captured fewer items than the total drug/therapy mentions in the A/P, you are likely missing something.
  Respond *only* with a JSON object using this exact schema:
  {
      "medication_plan": "A summary of the complete medication plan with specific drug names and doses."
  }

Therapy_plan: |
  TASK: Extract the 'therapy Plan' from the given 'Assessment/Plan' section.
  Include ONLY current or future therapy: chemotherapy, radiotherapy, hormonal therapy, and bone-therapy.
  Include future plans, changes to current therapy (start, stop, continue).

  CRITICAL — distinguish PAST from CURRENT/FUTURE:
  - PAST (DO NOT include): "underwent mastectomy in 2016", "s/p colectomy", "completed 6 cycles of TCHP", "had radiation in 2018", "s/p 4 cycles of AC and weekly taxol x 12" (s/p = status post = COMPLETED)
  - IMPORTANT: "s/p" or "status post" ALWAYS means COMPLETED/PAST. "S/p weekly taxol x 12" means taxol is DONE, not current.
  - CURRENT (include): "continue letrozole", "currently on irinotecan", "taking tamoxifen daily"
  - FUTURE (include): "will start", "plan to begin", "discussed starting", "switch to"
  IMPORTANT: "continue [drug]" IS a valid therapy plan. If the patient is continuing on current therapy, list the therapy being continued. Do NOT write "None" when the patient is actively on treatment.
  IMPORTANT: If a drug name is redacted/masked (shown as *****), write "unspecified agent" — do NOT guess the drug name.
  IMPORTANT: Include ALL of the following when mentioned in the A/P:
  - Dose changes (e.g., "change irinotecan to every other week, increase dose to 150mg/m2")
  - Radiation referrals or plans (e.g., "referral to Rad Onc for chest wall RT")
  - New drugs being started (e.g., "start letrozole", "begin tamoxifen")
  - Drugs being continued (e.g., "continue arimidex")
  - Follow-up/return instructions related to therapy (e.g., "RTC after XRT", "check labs")
  Do NOT write "None" unless the A/P truly has NO treatment discussion at all. If the A/P discusses ANY drug, therapy, or treatment plan, extract it.

  DO NOT include imaging plans (CT, MRI, PET, DEXA, Echo, echocardiogram, mammogram, bone scan, X-ray) — those belong in Imaging_Plan.
  DO NOT include lab plans — those belong in Lab_Plan.
  Only include THERAPY: chemotherapy drugs, hormonal drugs, radiation therapy, bone-protecting agents, and their schedules.

  Be SPECIFIC: include drug names, doses, schedule changes, and cycle information when mentioned.
  COMPREHENSIVENESS CHECK — before outputting, re-read the entire A/P and verify you captured ALL of the following:
  1. Every drug being STARTED (e.g., "start letrozole", "Rx given for palbociclib")
  2. Every drug being CONTINUED (e.g., "continue arimidex", "she is on Prolia")
  3. Every dose or schedule change (e.g., "reduce GCSF to 50%", "change to every other week")
  4. Radiation plans or referrals (e.g., "refer to Rad Onc for XRT", "6 weeks of radiation")
  5. Clinical trial discussions (e.g., "interested in ISPY trial", "eligible for ribociclib trial")
  6. Return/follow-up instructions tied to therapy (e.g., "RTC after XRT", "return in 6 months")
  7. Treatment contingencies (e.g., "if progression, could use faslodex", "if HER2+, will need anti-HER2")
  If you captured fewer than the total number of treatment-related items in the A/P, you are likely missing something.
  Respond *only* with a JSON object using this exact schema:
  {
      "therapy_plan": "A summary of the current and future therapy plan with specific details."
  }

radiotherapy_plan: |
  TASK: Extract the 'radiotherapy Plan' from the given 'Assessment/Plan' section.
  For radiotherapy, include ANY statement that indicates
  it is being considered, recommended, or may be used, even if no explicit
  start/continue/plan keywords are present.
  Include referrals to radiation oncology (Rad Onc) as a radiotherapy-related plan.

  CRITICAL — distinguish PAST from CURRENT/FUTURE:
  - PAST (DO NOT include): "had radiation in 2018", "s/p radiation", "completed radiation", "treated with lumpectomy followed by radiation", "had adjuvant radiation", "status post radiation"
  - CURRENT (include): "currently receiving radiation", "on radiation therapy"
  - FUTURE (include): "will start radiation", "radiation planned", "discussed radiation", "Rad Onc consult", "considering radiation"
  If a radiotherapy statement uses past tense or describes completed/historical treatment, it is PAST — do NOT include it.
  If the only radiotherapy mentioned is past/completed, write "None".

  Respond *only* with a JSON object using this exact schema:
  {
      "radiotherapy_plan": "A summary of any planned or discussed radiotherapy, or 'None' if not mentioned."
  }

Procedure_Plan: |
  TASK: Extract the 'Procedure Plan' from the given 'Assessment/Plan' section.
  Include ONLY future/planned procedures: surgery, biopsy, lumbar puncture, Chemo Port Insertion, or other interventional procedures.

  IMPORTANT — look for PRE-TREATMENT PREREQUISITES. When chemotherapy is planned, there are often preparatory steps mentioned with phrases like:
  - "prior to starting", "before initiating", "in order to start", "steps required"
  - "needs to undergo", "baseline", "will need"
  Common pre-chemo procedures: port placement (Mediport), chemotherapy teaching session, dental clearance.
  These ARE procedures and MUST be included.

  CRITICAL — distinguish PAST from FUTURE:
  - PAST (DO NOT include): "underwent mastectomy on 10/29/16", "s/p colectomy in June 2018", "had biopsy on 05/25", "completed radiation"
  - FUTURE (include): "will schedule biopsy", "plan for port placement", "surgery pending", "scheduled for colectomy next week", "needs port placement", "steps including port placement"
  If a procedure has a past date or uses past tense (underwent, had, completed, s/p), it is PAST — do NOT include it.

  Also DO NOT include:
  - Imaging plans (CT, MRI, PET, PET/CT, DEXA, bone scan, ultrasound, mammogram, echocardiogram/TTE, X-ray — these ALL go in Imaging_Plan, NOT here)
  - Radiation/radiotherapy plans (radiation, XRT, RT, chest wall RT, whole brain radiation — these go in radiotherapy_plan, NOT here)
  - Lab plans or blood tests
  - Medication/treatment plans (e.g., "continue arimidex", "could use faslodex" — these go in Medication_Plan)
  - Referrals or consultations (e.g., "XRT consult" is a referral, not a procedure)
  - General treatment goals or contingency plans
  - Genetic/molecular testing (Foundation One, Oncotype, BRCA panels — these go in Genetic_Testing_Plan)
  - Fertility preservation referrals (these go in Referral → Others)

  Common mistakes to AVOID:
  - "Brain MRI" → this is IMAGING, not a procedure
  - "chest wall RT" → this is RADIOTHERAPY, not a procedure
  - "will proceed with radiation" → this is RADIOTHERAPY, not a procedure
  - "TTE" or "echocardiogram" → this is IMAGING, not a procedure
  - "DEXA scan" → this is IMAGING, not a procedure
  - "chemotherapy", "TCHP", "FOLFOX", "AC-T" → these are MEDICATIONS/SYSTEMIC THERAPY, not procedures
  - "start letrozole", "continue tamoxifen" → these are MEDICATION plans, not procedures
  - "immunotherapy", "targeted therapy" → these are MEDICATIONS, not procedures
  FINAL CHECK — before outputting, verify EACH item in your procedure_plan:
  1. Is it a physical/surgical intervention? (surgery, biopsy, port placement, drain removal, LP) → YES, include
  2. Is it a systemic therapy? (chemo, hormonal, targeted, immunotherapy, AC, TCHP, taxol, letrozole, tamoxifen) → NO, goes in Medication_Plan
  3. Is it imaging? (CT, MRI, PET, echo, DEXA, bone scan, ultrasound, mammogram) → NO, goes in Imaging_Plan
  4. Is it radiation? (XRT, RT, GK, SRS) → NO, goes in radiotherapy_plan
  5. Is it dental clearance? → NO, this is a prerequisite, not a procedure
  If your procedure_plan contains ANY systemic therapy drug names, you have made an error — remove them.

  If no future procedures are planned, say "No procedures planned."
  Respond *only* with a JSON object using this exact schema:
  {
      "procedure_plan": "A summary of any planned procedures, or 'No procedures planned.'"
  }

Imaging_Plan: |
  TASK: Extract the 'Imaging Plan' from the given 'Assessment/Plan' section.
  Include ONLY future/planned imaging: CT, MRI, PET/CT, ultrasound, DEXA scans, bone scan, X-ray, echocardiogram (TTE/Echo), mammogram.
  Include timing and rationale if mentioned (e.g., "CT in 3 months for restaging").

  IMPORTANT — look for PRE-TREATMENT IMAGING. When chemotherapy (especially anthracyclines like AC, doxorubicin) is planned, an echocardiogram (TTE/Echo) is often required as a baseline cardiac assessment. Look for phrases like:
  - "prior to starting", "before initiating", "in order to start", "steps required", "baseline"
  - "will need TTE", "order echocardiogram", "Echo q6 months"
  Echocardiogram/TTE IS an imaging study and MUST be included here.

  CRITICAL — RESTAGING: Always look for restaging plans. Common patterns:
  - "restaging after X months", "restaging in X months", "scans again in X months"
  - "repeat imaging after X months on treatment", "reassess with scans"
  If restaging is mentioned, ALWAYS include it with timing (e.g., "restaging after 3 months of therapy").

  CRITICAL — distinguish PAST from FUTURE:
  - PAST (DO NOT include): "MRI showed lesions", "CT on 12/24/2019 showed...", "bone density scan last July showed...", "Echo was normal" (past result)
  - FUTURE (include): "will order MRI", "DEXA in 1 year, due July 2019", "scans again in 3 months", "annual mammogram next due July 2019", "consider brain MRI if worsening", "needs TTE before starting chemo", "restaging after 3 months"

  CRITICAL — only include DIAGNOSTIC imaging, not therapeutic radiation or procedures:
  - XRT, RT, radiation therapy, Gamma Knife, SRS, proton therapy → these go in radiotherapy_plan, NOT here
  - Biopsy, surgery, port placement, drain removal → these go in Procedure_Plan, NOT here. A biopsy is NEVER imaging even if the note says "correlation with imaging advised".
  - Only include: CT, MRI, PET/CT, DEXA, bone scan, mammogram, ultrasound, echocardiogram/TTE, X-ray
  FINAL CHECK: Before outputting, verify each item is one of the imaging types above. If it contains the word "biopsy", it is NOT imaging — remove it.

  CRITICAL — only include imaging ORDERED or PLANNED in the A/P:
  - Do NOT add standard-of-care monitoring that is NOT explicitly mentioned in the A/P.
  - Example: Do NOT add "echocardiogram" just because the patient is on an anthracycline, unless the A/P explicitly orders or mentions it.
  - Example: Do NOT add "mammogram" unless the A/P specifically schedules one.

  DO NOT include any procedure plan, lab plan, or medication plan.
  List SPECIFIC imaging types. Do NOT use vague terms like "staging workup".
  IMPORTANT: Search the ENTIRE Assessment/Plan for imaging keywords: CT, MRI, MRA, PET, DEXA, DXA, bone scan, mammogram, ultrasound, echocardiogram, TTE, Echo, X-ray. If ANY of these appear as future plans, include them.
  If no future imaging is planned, say "No imaging planned."
  Respond *only* with a JSON object using this exact schema:
  {
      "imaging_plan": "A summary of any planned imaging with specific test names, or 'No imaging planned.'"
  }

Lab_Plan: |
  TASK: Extract the 'lab Plan' from the clinical note.
  Look for lab orders in the Assessment/Plan section AND in any order sets listed elsewhere in the note (e.g., "Complete Blood Count with Differential" listed as an order near the top of the note).
  Include ONLY future/planned BLOOD TESTS: CBC, CMP, tumor markers (CA 15-3, CEA, CA-125, PSA), coagulation profile, hepatitis markers, etc.
  Also include pre-chemo blood draws (e.g., "blood draw prior to cycle", "labs before chemo", "draw and visit").
  Specify frequency and rationale if mentioned.

  CRITICAL — do NOT include these (they belong in OTHER fields):
  - Imaging scans: PET CT, CT, MRI, DEXA, bone scan, ultrasound, mammogram → these go in Imaging_Plan
  - Genomic/molecular tests: MammaPrint, Oncotype DX, BRCA panel, NGS, liquid biopsy → these go in Genetic_Testing_Plan
  - Treatment plans: medication changes, chemotherapy plans → these go in Medication_Plan
  Lab_Plan is ONLY for blood draws and lab work.

  DO NOT include past lab results. DO NOT use vague terms like "staging workup" — list the specific tests ordered.
  IMPORTANT: If the Assessment/Plan mentions MULTIPLE lab plans (e.g., both "sarcoid blood tests" and "iron panel repeat"), include ALL of them. Do not omit any.
  IMPORTANT: If the A/P mentions labs and imaging in the SAME sentence (e.g., "ordered MRI and bone scan as well as labs"),
  you must SEPARATE them — only include the lab part (e.g., "labs to complete staging workup"), NOT the imaging part.
  Never copy "MRI", "bone scan", "CT", "PET" into lab_plan even if they appear in the same sentence as labs.
  If the note lists specific lab orders (CBC, CMP, tumor markers, etc.) elsewhere, name those tests.
  If no future blood tests or labs are planned, say "No labs planned."
  Respond *only* with a JSON object using this exact schema:
  {
      "lab_plan": "A summary of the future lab plan with specific test names, or 'No labs planned.'"
  }

Genetic_Testing_Plan: |
  TASK: Extract the 'Genetic Testing Plan' from the given 'Assessment/Plan' section.

  1. Scope of section:
  - First, find the 'Assessment/Plan' section of the note (usually the final section).
  - Only look for plans that are clearly about FUTURE genetic or molecular TESTING.

  2. What COUNTS as 'genetic or molecular testing':
  - Diagnostic, prognostic, or predictive laboratory assays, such as:
    - Tumor genomic sequencing / NGS / panel testing
    - Germline genetic panels (e.g., hereditary cancer panel, BRCA testing)
    - Liquid biopsy / circulating tumor DNA (ctDNA) tests
    - Specific biomarker tests (e.g., PD-L1 testing, MSI testing, EGFR mutation testing)
    - Any plan to "send", "order", "check", or "obtain" a genetic, genomic, or molecular TEST
    - Referrals for genetic COUNSELING AND TESTING (e.g., "Rec genetic counseling and testing") — the counseling accompanies testing
    - Plans for Oncotype Dx even if phrased as "will likely need Oncotype after surgery" or "Oncotype to be sent"
    - Statements about molecular profiling (e.g., "patient wishes to proceed with molecular profiling")

  3. What MUST be EXCLUDED:
  CRITICAL: This field is ONLY for genetic/molecular TESTS. Do NOT put medication plans here.
  - "recommend ibrance and [drug]" is a MEDICATION PLAN, not genetic testing
  - "start letrozole" is a MEDICATION, not genetic testing
  - If the A/P only discusses treatment drugs and no tests, write "None planned."
  - DO NOT include any medications, systemic therapies, or treatment plans:
    - Chemotherapy, immunotherapy, targeted therapies (e.g., FGFR inhibitor, PARP inhibitor, CDK4/6 inhibitor, TKIs)
    - Hormonal therapy, radiation therapy, surgery
    - Clinical trial options, even if the trial involves targeted drugs or inhibitors
  - DO NOT include tests that are already completed, historic, or only mentioned in past oncology history.
  - DO NOT include imaging (CT, PET, MRI, X-ray, ultrasound) or routine labs (CBC, CMP).
  - DO NOT include IHC staining (ER/PR/HER2 status confirmation), FISH testing, or biopsy for receptor status — these are standard pathology, NOT genetic testing.
  - DO NOT include LVEF/echocardiogram, tumor markers (CA 15-3, CEA, CA 27.29), or other clinical lab rechecks.
  - DO NOT include vague "recheck" or "would recheck" statements that refer to lab values, imaging, or cardiac function — these are NOT genetic testing.
  - Oncotype DX, MammaPrint, Foundation One, Guardant360, BRCA panels, germline testing — these ARE genetic/molecular testing.

  4. CRITICAL — do NOT include content that belongs in OTHER fields:
  - Treatment contingency plans (e.g., "if progression, could use faslodex") → these go in Medication_Plan/Therapy_plan
  - Imaging plans (PET CT, MRI) → these go in Imaging_Plan
  - Response assessment text (e.g., "Not yet on treatment — no response to assess") → this is NOT genetic testing

  5. If there is NO new genetic or molecular test planned in the Assessment/Plan:
  - Set the value to: "None planned."

  6. Output format:
  Respond *only* with a JSON object using this exact schema:
  {
      "genetic_testing_plan": "A summary of any future planned genetic or molecular tests, or a clear statement that none are planned."
  }

Referral: |
  TASK: Extract all referrals and consults from this clinical note.
  Search the ENTIRE note — referrals may appear anywhere (HPI, A/P, Diagnosis section, etc.).
  Include any mention of referring, consulting, or sending the patient to another provider or service.
  Only include OUTGOING referrals (this doctor sending patient elsewhere), not INCOMING (patient was sent here).
  If no referral is mentioned for a category, set its value to "None".
  Respond *only* with a JSON object using this exact schema:
  {
  "Nutrition": "Nutrition or dietitian referral, or 'None'",
  "Genetics": "Genetics clinic or counselor referral, or 'None'",
  "Specialty": "Any specialty consult (Radiation oncology, surgical oncology, palliative care, pain management, psychology, dental, etc.), or 'None'",
  "Others": "Any other referral (social work, physical therapy, psycho-oncology, exercise counseling, financial counseling, home health, etc.), or 'None'",
  "follow up": "follow up mentioned in the provided text"
  }

follow_up_next_visit: |
  TASK: Extract the 'follow up/next visit' from the given 'Assessment/Plan' section.
  Be SPECIFIC about timing (e.g., "2 weeks", "after biopsy results", "3 months").
  Respond *only* with a JSON object using this exact schema:
  {
      "Next clinic visit": "(in-person or telehealth): timing and purpose"
  }

Genetic_Testing_Results: |
  TASK: Extract COMPLETED genetic and molecular testing results from this clinical note.
  This field captures testing that has ALREADY BEEN DONE and results are available.
  Do NOT include tests that are PLANNED for the future — those belong in Genetic_Testing_Plan.

  What to INCLUDE:
  - Germline testing results (BRCA1/2, ATM, PALB2, CHEK2, Lynch syndrome genes, hereditary cancer panel)
  - Tumor genomic sequencing results (Foundation Medicine, Tempus, UCSF500, NGS panels)
  - Specific mutations found (KRAS, TP53, PIK3CA, BRAF, NTRK, ESR1, etc.)
  - Microsatellite instability (MSI) status if from molecular testing
  - Tumor mutational burden (TMB)
  - Mismatch repair (MMR) protein status by IHC
  - Liquid biopsy / ctDNA results (Guardant360, FoundationOne Liquid, etc.)
  - Oncotype DX recurrence score, MammaPrint risk category and score
  - Variants of uncertain significance (VUS) — include which gene and variant
  - Negative/normal results (e.g., "hereditary cancer panel: negative", "no pathogenic variants found")
  - Non-secretor status (e.g., "patient does not express CA-19-9")
  - HRD (homologous recombination deficiency) status
  - PD-L1 expression level (CPS or TPS score)

  What to EXCLUDE:
  - Standard IHC pathology (ER/PR/HER2 status) — these belong in Cancer_Diagnosis
  - Routine lab results (CBC, CMP, tumor marker levels like CA 19-9 value) — these belong in Lab_Results
  - Tests that are PLANNED but not yet done — those belong in Genetic_Testing_Plan
  - Imaging results (CT, MRI, PET)

  Search the ENTIRE note — results may appear in HPI, pathology reports, genetics consultation notes,
  problem list, or Assessment/Plan. Look for keywords: "mutation", "variant", "pathogenic", "VUS",
  "panel", "sequencing", "Oncotype", "MammaPrint", "Foundation", "Guardant", "MSI", "MMR", "TMB",
  "germline", "somatic", "BRCA", "genetic testing", "molecular", "NGS", "ctDNA".

  If no genetic/molecular testing results are found anywhere in the note, write "No genetic testing results in note."

  Respond *only* with a JSON object using this exact schema:
  {
      "genetic_testing_results": "Summary of completed genetic/molecular test results including mutations found, VUS, negative results, and test platform used. Or 'No genetic testing results in note.'"
  }

Advance_care_planning: |
  TASK: Extract the 'Advance care planning' from the clinical note.
  Include Advance directives, health-care proxy, code status (e.g., Full code, DNR/DNI), living will.
  IMPORTANT: Code status is often found OUTSIDE the Assessment/Plan section — look in the FULL NOTE for:
  - "Code status: Full code" or "Full code"
  - "DNR" or "DNI" or "DNR/DNI"
  - "Advance Care Planning" section
  - "has a living will" or "health care proxy"
  If a code status is mentioned ANYWHERE in the note, include it.
  If no advance care planning is discussed and no code status is found, say "Not discussed during this visit."
  Respond *only* with a JSON object using this exact schema:
  {
      "Advance care": "A summary of any advance care planning including code status, or 'Not discussed during this visit.'"
  }
